# Pre-commit hooks for MissionAgre.
#
# Install once per clone:
#   pip install pre-commit && pre-commit install
#
# Backend tools (ruff, black, mypy) and frontend tools (eslint, prettier) run
# scoped to their subdirectories so the hooks stay green even before those
# subdirs exist. As PR 2 / PR 3 add code, the configs below pick them up
# automatically.
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(.*\.md)$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '^infra/helm/.*/templates/.*\.ya?ml$'
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        files: '^backend/.*\.py$'
        args: [--fix]
      - id: ruff-format
        files: '^backend/.*\.py$'

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: '^backend/.*\.py$'
        args: [--check]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: '^backend/app/.*\.py$'
        additional_dependencies:
          - pydantic>=2
          - sqlalchemy>=2
          - types-PyYAML
        args: [--config-file=backend/pyproject.toml]
        # Run on push, not on every commit — type-checking on a partial
        # tree is noisy.
        stages: [pre-push]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '^(frontend/.*\.(ts|tsx|js|jsx|json|css|scss|html|md)|.*\.ya?ml)$'
        exclude: '^infra/helm/.*/templates/.*\.ya?ml$'

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0
    hooks:
      - id: eslint
        files: '^frontend/.*\.(ts|tsx|js|jsx)$'
        # Frontend doesn't exist in PR 1. PR 3 promotes this to push stage.
        stages: [manual]

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
