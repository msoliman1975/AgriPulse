# Pre-commit hooks for AgriPulse.
#
# Install once per clone:
#   pip install pre-commit && pre-commit install
#
# Backend tools (ruff, black, mypy) and frontend tools (eslint, prettier) run
# scoped to their subdirectories so the hooks stay green even before those
# subdirs exist. As PR 2 / PR 3 add code, the configs below pick them up
# automatically.
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(.*\.md)$'
      - id: end-of-file-fixer
        # Vendored CRD bundles ship verbatim from upstream operator
        # releases; we don't own their byte layout. Mismatched trailing
        # newlines would dirty every regen.
        exclude: '^infra/argocd/(cnpg|kube-prometheus-stack)-crds/.*\.ya?ml$'
      - id: check-yaml
        args: [--allow-multiple-documents]
        # Helm chart templates are Go-templated, not valid YAML.
        # Vendored CRD bundles use YAML 1.1 features (e.g. the `=` merge
        # key, tag:yaml.org,2002:value) that PyYAML's safe loader
        # rejects; upstream renderers accept them fine. Validating them
        # here is theatre — kubectl will reject anything actually
        # broken.
        exclude: '^(infra/helm/.*/templates/.*\.ya?ml|infra/argocd/(cnpg|kube-prometheus-stack)-crds/.*\.ya?ml)$'
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=lf]
        # Windows-only scripts are pinned to CRLF in .gitattributes; skip
        # them here so the hook doesn't fight git's checkout normalization.
        exclude: '\.(ps1|bat|cmd)$'
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        files: '^backend/.*\.py$'
        args: [--fix]
      - id: ruff-format
        files: '^backend/.*\.py$'

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: '^backend/.*\.py$'
        args: [--check]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: '^backend/app/.*\.py$'
        additional_dependencies:
          - pydantic>=2
          - sqlalchemy>=2
          - types-PyYAML
        args: [--config-file=backend/pyproject.toml]
        # Run on push, not on every commit â€” type-checking on a partial
        # tree is noisy.
        stages: [pre-push]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        # Frontend has its own pinned Prettier (frontend/prettier.config.js,
        # printWidth 100) and runs `pnpm format:check` in the frontend CI
        # job. The mirrored Prettier here uses defaults and would fight that
        # config â€” keep it scoped to YAML only (matches the pre-PR-3
        # behaviour for everything outside frontend/).
        files: '\.ya?ml$'
        # Excludes:
        #   - Helm chart templates (Go-templated, not valid YAML to prettier).
        #   - pnpm-lock.yaml (machine-generated; pnpm owns the format).
        #   - Vendored CRD bundles (upstream-shaped, regenerated by
        #     curl, not Prettier).
        exclude: '^(infra/helm/.*/templates/.*\.ya?ml|.*/pnpm-lock\.yaml|infra/argocd/(cnpg|kube-prometheus-stack)-crds/.*\.ya?ml)$'

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0
    hooks:
      - id: eslint
        files: '^frontend/.*\.(ts|tsx|js|jsx)$'
        # Frontend ESLint requires the project's exact node_modules + the
        # tsconfig.app.json typescript-eslint reads for type-checked rules.
        # Pre-commit's mirrored hook runs in an isolated environment that
        # cannot reach those, so authoritative linting happens in the
        # `frontend` CI job (`pnpm lint`). Run manually with
        # `pre-commit run eslint --hook-stage manual --files <paths>` if
        # you want a quick local check.
        stages: [manual]

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
