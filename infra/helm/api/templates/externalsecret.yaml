{{- if .Values.externalSecret.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "agripulse-api.fullname" . }}
  labels:
    {{- include "agripulse-api.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "agripulse-api.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- /*
      crossRefs pulls each per-purpose SM secret created by CD-9
      (`agripulse/<env>/<purpose>`). Each item targets a full SM key so
      the value is the secret_string directly — no `property`. The key
      is `tpl`-rendered so `{{ .Values.global.env }}` resolves per overlay.
    */}}
    {{- range .Values.externalSecret.crossRefs }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ tpl .remoteKey $ }}
    {{- end }}
{{- end }}
