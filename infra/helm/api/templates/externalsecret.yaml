{{- if .Values.externalSecret.enabled -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "agripulse-api.fullname" . }}
  labels:
    {{- include "agripulse-api.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "agripulse-api.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.externalSecret.remoteRef.key }}
        property: {{ .property }}
    {{- end }}
    {{- /*
      crossRefs lets a chart pull from per-purpose SM secrets created by
      CD-9 (`agripulse/<env>/<purpose>`). Each item targets a full SM key
      so the value is the secret_string directly â€” no `property`. The key
      is `tpl`-rendered so `{{ .Values.global.env }}` resolves per overlay.
    */}}
    {{- range .Values.externalSecret.crossRefs }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ tpl .remoteKey $ }}
    {{- end }}
{{- end }}
