{{- /*
ArgoCD PreSync hook Job — applies all DB migrations before any new
ReplicaSet of the api Deployment goes live.

Two phases chained in a single container:

  1. `alembic -n public upgrade head` — schema migrations for the
     shared public schema (tenants, users, audit log, etc.).
  2. `python -m scripts.migrate_tenants` — walks every active tenant
     row in public.tenants and applies the tenant-schema migrations
     to its dedicated schema. Reruns are idempotent.

Why both run here: before this change, only step 1 ran automatically.
Tenant-schema migrations were a manual operator step (kubectl-exec
into the api pod, run migrate_tenants). Skipping that step meant
deploys that added a tenant migration would 500 on every request
that touched a still-stale tenant schema — exactly the failure mode
we hit on the 0030 board-columns migration. Chaining the two keeps
deploy and schema state in lock-step.

The Job uses the same image + envFrom (configmap + ExternalSecret) as
the api Deployment, plus DATABASE_PASSWORD from the CNPG-managed
agripulse-pg-app Secret. Settings.merge_database_password splices the
password into DATABASE_SYNC_URL at runtime; alembic env.py then uses
that URL.

Notes
-----
- hook-delete-policy `before-hook-creation,hook-succeeded` keeps a
  failed job's Pod around for inspection (delete it manually after).
- 1500Mi memory limit accommodates pgstac's appetite + a per-tenant
  alembic context (peak ~200Mi during a multi-step tenant upgrade).
- amd64 pin matches the api Deployment (image is amd64-only today).
*/ -}}
{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agripulse-api.fullname" . }}-migrate
  labels:
    {{- include "agripulse-api.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "agripulse-api.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "agripulse-api.serviceAccountName" . }}
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: alembic
          image: {{ include "agripulse-api.imageRef" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Chained via `sh -c` so the tenant pass only runs if the
          # public pass succeeded — `set -euo pipefail` makes the
          # container exit non-zero on the first failure so ArgoCD
          # blocks the sync instead of rolling pods against a stale
          # schema.
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              echo ">> alembic upgrade head (public)"
              /opt/venv/bin/alembic -c /app/alembic.ini -n public upgrade head
              echo ">> migrate_tenants (all active tenants)"
              /opt/venv/bin/python -m scripts.migrate_tenants
          workingDir: /app
          envFrom:
            - configMapRef:
                name: agripulse-app-config
            - configMapRef:
                name: {{ include "agripulse-api.fullname" . }}
            - secretRef:
                name: {{ include "agripulse-api.fullname" . }}-secrets
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databasePasswordSecret.name }}
                  key: {{ .Values.databasePasswordSecret.key }}
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1500Mi
{{- end }}
