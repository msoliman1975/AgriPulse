image:
  repository: ghcr.io/msoliman1975/missionagre/api
  tag: "" # Empty → falls back to .Chart.AppVersion in the Deployment.
  pullPolicy: IfNotPresent
imagePullSecrets: []

replicaCount: 2

# Image is read-only at runtime; the venv was assembled at build time.
revisionHistoryLimit: 5

serviceAccount:
  create: true
  name: "" # Empty → "{{ Release.Name }}-api"
  annotations: {}

service:
  type: ClusterIP
  port: 8000
  metricsPort: 9090

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    cert-manager.io/cluster-issuer: letsencrypt-staging
  host: api.dev.missionagre.local
  pathPrefix: /api
  tlsSecretName: missionagre-api-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "false" # ServiceMonitor handles scraping.

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

probes:
  liveness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
  readiness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3

# Non-secret env. Production endpoints live in the per-env values.
env:
  APP_ENV: production
  APP_LOG_LEVEL: INFO
  DATABASE_URL: postgresql+asyncpg://missionagre@missionagre-pg-rw:5432/missionagre
  DATABASE_SYNC_URL: postgresql+psycopg://missionagre@missionagre-pg-rw:5432/missionagre
  REDIS_URL: redis://missionagre-redis:6379/0
  CELERY_BROKER_URL: redis://missionagre-redis:6379/1
  CELERY_RESULT_BACKEND: redis://missionagre-redis:6379/2
  KEYCLOAK_ISSUER: https://keycloak.dev.missionagre.local/realms/missionagre
  KEYCLOAK_AUDIENCE: missionagre-api
  KEYCLOAK_JWKS_URL: https://keycloak.dev.missionagre.local/realms/missionagre/protocol/openid-connect/certs
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.observability.svc.cluster.local:4318

# Secrets pulled from AWS Secrets Manager via ExternalSecret. The remote
# JSON object's top-level keys are projected as env vars on the Pod.
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  remoteRef:
    key: missionagre/api
  # Map remote keys → in-pod env names.
  data:
    - secretKey: DATABASE_PASSWORD
      property: database_password
    - secretKey: KEYCLOAK_CLIENT_SECRET
      property: keycloak_client_secret
    - secretKey: AWS_ACCESS_KEY_ID
      property: aws_access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      property: aws_secret_access_key

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false # Enabled per-env in the production overlay.

nodeSelector: {}
tolerations: []
affinity: {}
