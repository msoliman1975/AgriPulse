image:
  repository: ghcr.io/msoliman1975/agripulse/api
  tag: "" # Empty â†’ falls back to .Chart.AppVersion in the Deployment.
  pullPolicy: IfNotPresent
imagePullSecrets: []

# Re-declared per chart so a bare `helm template` of this chart still
# resolves; overlays override `global.env` + `global.envHost`. The
# `images.api.tag` slot is seeded empty so the imageRef helper's lookup
# never NPEs when the chart is rendered without an overlay; the dev
# overlay's argocd-sync.yml workflow fills it per-image (CD-12).
global:
  env: dev
  envHost: dev.agripulse.cloud
  images:
    api:
      tag: ""

replicaCount: 2

# Image is read-only at runtime; the venv was assembled at build time.
revisionHistoryLimit: 5

serviceAccount:
  create: true
  name: "" # Empty â†’ "{{ Release.Name }}-api"
  annotations: {}

service:
  type: ClusterIP
  port: 8000
  metricsPort: 9090

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    cert-manager.io/cluster-issuer: letsencrypt-staging
  # Final host is rendered as `${hostPrefix}.${global.envHost}` by the
  # Ingress template. Overlays only flip `global.envHost`; the prefix is
  # the same in every env.
  hostPrefix: api
  pathPrefix: /api
  tlsSecretName: agripulse-api-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "false" # ServiceMonitor handles scraping.

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

probes:
  liveness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
  readiness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3

# Non-secret env. Production endpoints live in the per-env values.
env:
  APP_ENV: production
  APP_LOG_LEVEL: INFO
  DATABASE_URL: postgresql+asyncpg://agripulse@agripulse-pg-rw:5432/agripulse
  DATABASE_SYNC_URL: postgresql+psycopg://agripulse@agripulse-pg-rw:5432/agripulse
  REDIS_URL: redis://agripulse-redis:6379/0
  CELERY_BROKER_URL: redis://agripulse-redis:6379/1
  CELERY_RESULT_BACKEND: redis://agripulse-redis:6379/2
  KEYCLOAK_ISSUER: "https://keycloak.{{ .Values.global.envHost }}/realms/agripulse"
  KEYCLOAK_AUDIENCE: agripulse-api
  KEYCLOAK_JWKS_URL: "https://keycloak.{{ .Values.global.envHost }}/realms/agripulse/protocol/openid-connect/certs"
  # Provisioning: api creates KC groups + invites users when a tenant is
  # created. Disabled by default in settings.py — flipping here so the
  # cluster deploys with it on. Requires the `agripulse-tenancy` client
  # to exist in the realm with realm-management roles on its service
  # account; the client secret comes via ExternalSecret below.
  KEYCLOAK_PROVISIONING_ENABLED: "true"
  KEYCLOAK_BASE_URL: "https://keycloak.{{ .Values.global.envHost }}"
  KEYCLOAK_REALM: agripulse
  KEYCLOAK_ADMIN_CLIENT_ID: agripulse-tenancy
  # SMTP for app-side emails (notifications, etc.). Keycloak's own
  # realm.smtpServer is configured separately — it sends the
  # execute-actions-email invite from KC, not the api.
  SMTP_HOST: smtp-relay.brevo.com
  SMTP_PORT: "587"
  SMTP_USERNAME: "aac72b001@smtp-brevo.com"
  SMTP_STARTTLS: "true"
  SMTP_FROM: "AgriPulse <admin@agripulse.tech>"
  # SPA at app.<envHost> calls api.<envHost> cross-origin. CORS middleware
  # only attaches when this list is non-empty (see app/core/app_factory.py).
  CORS_ALLOWED_ORIGINS: '["https://app.{{ .Values.global.envHost }}"]'
  # Tempo's service in the observability ns is named `observability-tempo`
  # (release-name + chart-name pattern), not bare `tempo`. Sending to the
  # wrong host caused per-request OTLP retry storms that starved the
  # asyncio loop and made client-side requests look like "Network error".
  OTEL_EXPORTER_OTLP_ENDPOINT: http://observability-tempo.observability.svc.cluster.local:4318
  # On backend cold start, if no active PlatformAdmin exists in
  # public.platform_role_assignments, the lifespan seeds one from these
  # two values. Empty email skips the bootstrap. Per-env overlays set the
  # real address; the default here is intentionally empty so a chart
  # rendered without an overlay never silently provisions an admin.
  PLATFORM_ADMIN_EMAIL: ""
  PLATFORM_ADMIN_FULL_NAME: "Platform Admin"
  # Sentinel Hub OAuth client_id. Public (not secret) — paired with
  # SENTINEL_HUB_CLIENT_SECRET pulled via ExternalSecret below. Empty
  # default makes SentinelHubProvider raise SentinelHubNotConfiguredError
  # so dev clusters without creds surface the misconfig loudly. Override
  # in the per-env overlay with the value from the Sentinel Hub OAuth
  # client dashboard.
  SENTINEL_HUB_CLIENT_ID: ""

# Secrets pulled from AWS Secrets Manager via ExternalSecret. We use
# crossRefs only (one SM secret per purpose at `agripulse/<env>/<purpose>`);
# the older consolidated-JSON-blob approach (`remoteRef.key: agripulse/api`)
# was removed because:
#   - DATABASE_PASSWORD lives in the CNPG-managed `agripulse-pg-app` k8s
#     Secret (CNPG owns its lifecycle — see extraEnv below).
#   - AWS_ACCESS_KEY_ID / _SECRET_ACCESS_KEY would override the SA's IRSA
#     credentials at runtime, which we don't want.
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  # CD-9 per-purpose secrets at `agripulse/<env>/<purpose>`. Each entry's
  # `remoteKey` is `tpl`-rendered against the chart context, so
  # `.Values.global.env` resolves from the overlay (dev/staging/prod).
  crossRefs:
    - secretKey: SMTP_PASSWORD
      remoteKey: "agripulse/{{ .Values.global.env }}/brevo-smtp-password"
    - secretKey: JWT_SIGNING_KEY
      remoteKey: "agripulse/{{ .Values.global.env }}/jwt-signing-key"
    - secretKey: SENTINEL_HUB_CLIENT_SECRET
      remoteKey: "agripulse/{{ .Values.global.env }}/sentinel-hub-client-secret"
    # Settings reads `keycloak_admin_client_secret` from env
    # `KEYCLOAK_ADMIN_CLIENT_SECRET`. Source secret is unchanged
    # (agripulse/<env>/keycloak-client-secret); we just bind it to the
    # name the code expects.
    - secretKey: KEYCLOAK_ADMIN_CLIENT_SECRET
      remoteKey: "agripulse/{{ .Values.global.env }}/keycloak-client-secret"

# DATABASE_PASSWORD is sourced from the k8s Secret CNPG creates for the
# bootstrap app user (`<cluster>-app`, key `password`). This avoids
# duplicating the credential in AWS Secrets Manager.
databasePasswordSecret:
  name: agripulse-pg-app
  key: password

# ArgoCD PreSync hook Job — runs `alembic upgrade head` against the
# public schema before the api Deployment rolls. See
# templates/migration-job.yaml. Disable per-env if you'd rather drive
# migrations from a CI pipeline.
migrationJob:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false # Enabled per-env in the production overlay.

# Stopgap until multi-arch CI lands: app images at
# ghcr.io/msoliman1975/agripulse/api are amd64-only, so the chart needs
# to pin pods to amd64 nodes to avoid "no match for platform in manifest"
# errors when Karpenter places them on arm64 (cheaper Graviton) nodes.
nodeSelector:
  kubernetes.io/arch: amd64
tolerations: []
affinity: {}
