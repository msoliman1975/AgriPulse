{{- if .Values.postgresCluster.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.postgresCluster.name }}
  labels:
    {{- include "agripulse.shared.labels" . | nindent 4 }}
spec:
  description: AgriPulse primary Postgres cluster (CloudNativePG-managed).
  imageName: {{ .Values.postgresCluster.imageName | quote }}
  instances: {{ .Values.postgresCluster.instances }}

  {{- with .Values.postgresCluster.serviceAccountAnnotations }}
  serviceAccountTemplate:
    metadata:
      annotations:
        {{- toYaml . | nindent 8 }}
  {{- end }}

  bootstrap:
    initdb:
      database: agripulse
      owner: agripulse
      postInitSQL:
        {{- range .Values.postgresCluster.postInitSQL }}
        - {{ . | quote }}
        {{- end }}

  {{- /* CD-13: managed roles. CNPG creates+reconciles each role and
         pulls the password from a k8s Secret. Used for the `keycloak`
         role so Keycloak's externalDatabase connects with the same
         credential the role was created with. Empty list disables this. */}}
  {{- with .Values.postgresCluster.managed }}
  {{- if .roles }}
  managed:
    roles:
      {{- range .roles }}
      - name: {{ .name | quote }}
        ensure: {{ default "present" .ensure | quote }}
        login: {{ default true .login }}
        superuser: {{ default false .superuser }}
        createdb: {{ default false .createdb }}
        createrole: {{ default false .createrole }}
        inherit: {{ default true .inherit }}
        {{- with .comment }}
        comment: {{ . | quote }}
        {{- end }}
        passwordSecret:
          name: {{ .passwordSecret.name | quote }}
      {{- end }}
  {{- end }}
  {{- end }}

  storage:
    size: {{ .Values.postgresCluster.storage.size }}
    storageClass: {{ .Values.postgresCluster.storage.storageClass | quote }}

  walStorage:
    size: {{ .Values.postgresCluster.walStorage.size }}
    storageClass: {{ .Values.postgresCluster.walStorage.storageClass | quote }}

  resources:
    {{- toYaml .Values.postgresCluster.resources | nindent 4 }}

  {{- with .Values.postgresCluster.affinity }}
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  postgresql:
    {{- with .Values.postgresCluster.postgresql.shared_preload_libraries }}
    # CNPG rejects shared_preload_libraries under `parameters` (it's a
    # "fixed" config param). Top-level array is the supported path.
    shared_preload_libraries:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    parameters:
      {{- range $k, $v := .Values.postgresCluster.postgresql.parameters }}
      {{ $k }}: {{ $v | quote }}
      {{- end }}

  {{- if .Values.postgresCluster.backup.enabled }}
  {{- $bos := .Values.postgresCluster.backup.barmanObjectStore }}
  backup:
    barmanObjectStore:
      destinationPath: {{ tpl $bos.destinationPath . | quote }}
      {{- with $bos.endpointURL }}
      # Non-AWS S3 (e.g. Cloudflare R2 / MinIO). Empty for AWS S3.
      endpointURL: {{ . | quote }}
      {{- end }}
      s3Credentials:
        {{- if $bos.s3Credentials.inheritFromIAMRole }}
        inheritFromIAMRole: true
        {{- else }}
        # Static S3-compatible creds from a Secret (R2). The keys default to
        # ACCESS_KEY_ID / SECRET_ACCESS_KEY (matches the agripulse-r2 Secret).
        accessKeyId:
          name: {{ $bos.s3Credentials.secretName | quote }}
          key: {{ $bos.s3Credentials.accessKeyIdKey | default "ACCESS_KEY_ID" | quote }}
        secretAccessKey:
          name: {{ $bos.s3Credentials.secretName | quote }}
          key: {{ $bos.s3Credentials.secretAccessKeyKey | default "SECRET_ACCESS_KEY" | quote }}
        {{- end }}
      wal:
        compression: {{ .Values.postgresCluster.backup.barmanObjectStore.wal.compression | quote }}
        maxParallel: {{ .Values.postgresCluster.backup.barmanObjectStore.wal.maxParallel }}
    retentionPolicy: {{ .Values.postgresCluster.backup.retentionPolicy | quote }}
  {{- end }}

  monitoring:
    enablePodMonitor: true
{{- end }}
