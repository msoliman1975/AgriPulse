{{- if and .Values.postgresCluster.enabled .Values.postgresCluster.backup.enabled .Values.postgresCluster.scheduledBackup.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ .Values.postgresCluster.name }}-scheduled
  labels:
    {{- include "missionagre.shared.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.postgresCluster.scheduledBackup.schedule | quote }}
  backupOwnerReference: {{ .Values.postgresCluster.scheduledBackup.backupOwnerReference | quote }}
  cluster:
    name: {{ .Values.postgresCluster.name }}
{{- end }}
