{{- if .Values.karpenter.enabled }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
  labels:
    {{- include "agripulse.shared.labels" . | nindent 4 }}
spec:
  weight: 10
  template:
    metadata:
      labels:
        agripulse.cloud/role: workload
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64", "amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["t", "m", "c"]
        - key: karpenter.k8s.aws/instance-size
          operator: NotIn
          values: ["metal", "nano", "micro"]
      expireAfter: 720h
  limits:
    cpu: 100
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  labels:
    {{- include "agripulse.shared.labels" . | nindent 4 }}
spec:
  amiFamily: AL2023
  role: {{ required "karpenter.nodeIAMRoleName must be set (terraform output karpenter.node_iam_role_name)" .Values.karpenter.nodeIAMRoleName | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ required "karpenter.clusterName must be set" .Values.karpenter.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.karpenter.clusterName | quote }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
  tags:
    karpenter.sh/cluster: {{ .Values.karpenter.clusterName | quote }}
    agripulse.cloud/managed-by: karpenter
{{- end }}
