# Default values for the agripulse-shared chart. Per-env overrides live
# in infra/argocd/overlays/<env>/values.yaml so dev/staging/prod diverge
# only in things that genuinely differ (domain names, S3 buckets, etc.).

# ---------------------------------------------------------------------------
# Global identifiers reused across templates.
#   * `env` plugs into the CNPG backup destinationPath
#     (s3://agripulse-pg-backup-<env>) and is expected to be overridden
#     per ArgoCD overlay.
#   * `envHost` is the per-env DNS suffix consumed by every service chart's
#     ingress + env templates (api.<envHost>, app.<envHost>, â€¦). Overlays
#     set this to `dev.agripulse.cloud` / `staging.agripulse.cloud` /
#     `agripulse.cloud`. The dev default lives here so a bare `helm
#     template` still produces a valid manifest.
# ---------------------------------------------------------------------------
global:
  env: dev
  envHost: dev.agripulse.cloud

# ---------------------------------------------------------------------------
# Common labels applied by every templates/_labels.tpl include.
# ---------------------------------------------------------------------------
labels:
  partOf: agripulse

# ---------------------------------------------------------------------------
# cert-manager ClusterIssuer.
# ---------------------------------------------------------------------------
certManager:
  enabled: true
  # Two issuers ship by default: Let's Encrypt staging (for development
  # validation) and prod (used in staging + production envs).
  acme:
    email: ops@agripulse.cloud
    staging:
      enabled: true
      name: letsencrypt-staging
      server: https://acme-staging-v02.api.letsencrypt.org/directory
    prod:
      enabled: true
      name: letsencrypt-prod
      server: https://acme-v02.api.letsencrypt.org/directory
    # DNS-01 solver against Route 53 â€” the controller assumes the
    # cert-manager IRSA role at runtime, so no static AWS credentials.
    # `route53Region` / `route53HostedZoneId` are overridden per-env via
    # overlays/<env>/values.yaml when the hosted-zone ID is known.
    solvers:
      - dns01:
          route53:
            region: eu-south-1
        selector:
          dnsZones:
            - agripulse.cloud

# ---------------------------------------------------------------------------
# External Secrets Operator integration.
# ---------------------------------------------------------------------------
# A ClusterSecretStore wired to AWS Secrets Manager; per-service charts
# emit ExternalSecret resources pointing at it.
externalSecrets:
  enabled: true
  clusterSecretStore:
    name: aws-secretsmanager
    region: eu-south-1
    # IRSA role assumed by the ESO controller pod. Created in
    # infra/terraform/iam.tf and consumed here by name.
    serviceAccount:
      name: external-secrets
      namespace: external-secrets

# ---------------------------------------------------------------------------
# CloudNativePG Cluster.
# ---------------------------------------------------------------------------
postgresCluster:
  enabled: true
  name: agripulse-pg
  instances: 2
  # CNPG-aware community build that bundles PG 16 + TimescaleDB + PostGIS
  # + pgaudit (matches shared_preload_libraries + the postInitSQL
  # CREATE EXTENSION list). Upstream `ghcr.io/cloudnative-pg/postgresql`
  # has no timescaledb, which causes PG startup to fail with
  # `could not access file "timescaledb"` once shared_preload_libraries
  # references it. The image is published amd64-only; CNPG pods are
  # pinned to amd64 via `affinity` below.
  imageName: ghcr.io/imusmanmalik/timescaledb-postgis:16-3.5-115
  # Force CNPG pods onto amd64 nodes. Karpenter provisions both arm64
  # (cheap default) and amd64 (when needed); this selector keeps PG on
  # amd64 since the chosen image is amd64-only.
  affinity:
    nodeSelector:
      kubernetes.io/arch: amd64
  # IRSA annotations applied to the CNPG-managed ServiceAccount via
  # `spec.serviceAccountTemplate.metadata.annotations`. Overlays set the
  # `eks.amazonaws.com/role-arn` key from `terraform output
  # agripulse_env_resources.<env>.cnpg_irsa_arn`.
  serviceAccountAnnotations: {}
  storage:
    size: 100Gi
    storageClass: gp3
  walStorage:
    size: 30Gi
    storageClass: gp3
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi
  # Extensions enabled at first init.
  postInitSQL:
    - "CREATE EXTENSION IF NOT EXISTS postgis;"
    - "CREATE EXTENSION IF NOT EXISTS postgis_topology;"
    - "CREATE EXTENSION IF NOT EXISTS timescaledb;"
    - "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
    - "CREATE EXTENSION IF NOT EXISTS citext;"
    - "CREATE EXTENSION IF NOT EXISTS pgaudit;"
    # pgstac (used by the imagery catalog migration 0007) creates its
    # own roles (pgstac_admin, pgstac_ingest, pgstac_read) and needs
    # btree_gist for catalog indexes. Without CREATEROLE on `agripulse`
    # the migration aborts with "permission denied to create role".
    - "CREATE EXTENSION IF NOT EXISTS btree_gist;"
    - "ALTER ROLE agripulse WITH CREATEROLE;"
  # CD-13: roles managed by CNPG. The `keycloak` role owns the keycloak
  # database; its password is the k8s Secret synced from SM by the
  # keycloak chart's ExternalSecret (agripulse-keycloak-db).
  managed:
    roles:
      - name: keycloak
        ensure: present
        login: true
        comment: "Keycloak realm DB owner (CD-13)"
        passwordSecret:
          name: agripulse-keycloak-db
  # Per-CR databases living in the same Cluster. The primary
  # `agripulse` DB comes from bootstrap.initdb above; anything else
  # goes here so CNPG can reconcile it.
  # NOTE: Database CRD requires CNPG operator >= v1.25.0; pinned chart
  # 0.22.1 ships v1.24.1. Keep `declarativeDatabases.enabled: false` until
  # the operator + cnpg-crds bundle is bumped.
  declarativeDatabases:
    enabled: false
  databases:
    - name: keycloak
      owner: keycloak
      ensure: present
  # Postgres-wide config; tenant migrations are in
  # backend/migrations/{public,tenant}/ and apply via the API pod's
  # init container.
  postgresql:
    # CNPG's webhook flags shared_preload_libraries as a fixed parameter;
    # render it as a top-level array on spec.postgresql, not under
    # `parameters`.
    shared_preload_libraries:
      - timescaledb
      - pgaudit
    parameters:
      max_connections: "200"
      log_statement: "ddl"
  # Backup target. Buckets + IRSA come from CD-6. `destinationPath` is
  # templated against `global.env`; overlays override only when they want
  # a non-default retention. Hits the `agripulse-pg-backup-<env>` bucket
  # via the CNPG SA's IRSA role.
  backup:
    enabled: true
    barmanObjectStore:
      destinationPath: "s3://agripulse-pg-backup-{{ .Values.global.env }}/pg"
      s3Credentials:
        inheritFromIAMRole: true
      wal:
        compression: gzip
        maxParallel: 4
    retentionPolicy: "30d"
  # CNPG `ScheduledBackup` resource. Daily at 02:00 UTC. CNPG cron is
  # 6-field (seconds + 5-field). Backup objects are owned by the
  # ScheduledBackup itself so deleting it cleans up the chain.
  scheduledBackup:
    enabled: true
    schedule: "0 0 2 * * *"
    backupOwnerReference: self

# ---------------------------------------------------------------------------
# Redis — Celery broker + app-side cache. api/workers consume it via
#   redis://agripulse-redis:6379/{0,1,2}
# (REDIS_URL / CELERY_BROKER_URL / CELERY_RESULT_BACKEND, baked into
# infra/helm/{api,workers}/values.yaml). Sized for dev — flip
# `enabled: false` in higher envs that point at an external Redis.
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image: redis:7.4-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Namespace-scoped ConfigMap shared by every service chart.
# ---------------------------------------------------------------------------
appConfig:
  serviceName: agripulse
  region: eu-south-1
  log:
    level: INFO
    format: json

# ---------------------------------------------------------------------------
# Karpenter (CD-8). NodePool + EC2NodeClass live in
# templates/karpenter-nodepools.yaml. The controller chart itself is
# installed via the platform ApplicationSet, not this chart.
# ---------------------------------------------------------------------------
karpenter:
  # Default off: the NodePool + EC2NodeClass need real AWS resource names
  # (cluster name + node IAM role) before they can render. Overlays flip
  # this to true and fill in the values from `terraform output karpenter`.
  enabled: false
  clusterName: ""
  nodeIAMRoleName: ""
