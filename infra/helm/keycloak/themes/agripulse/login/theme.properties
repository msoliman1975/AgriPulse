# AgriPulse custom login theme.
#
# parent=keycloak.v2 inherits PatternFly 4 macros (registrationLayout
# slots, kcSanitize, messagesPerField helpers). We DO NOT use the legacy
# `keycloak` (PF3) parent.
#
# styles= takes a space-separated list rendered as `<link rel=stylesheet>`
# tags in the inherited template.ftl. Ours is one CSS file that fully
# replaces the v2 chrome — we don't import the inherited styles because
# the split-pane layout would fight them. resources/img holds the
# pre-rendered brand mark SVG (CSP-safe — no inline JS).
#
# locales: English only on the login surface — bilingual EN/AR lives
# inside the app post-login per the locked design. See
# [[project-login-page-locked-design]].
parent=keycloak.v2
import=common/keycloak

styles=css/login.css

locales=en
