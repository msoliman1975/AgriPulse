# AgriPulse — locked English copy for the login surface.
#
# Anything NOT overridden here falls back to the parent keycloak.v2
# theme's messages_en.properties — including most form labels, error
# strings, and the password-update / verify-email flow copy.
#
# Source of truth for visual copy: docs/login-mockups/option-1-field.html
# (the locked design — see [[project-login-page-locked-design]]).

# Page heading on login.ftl.
loginAccountTitle=Welcome back.

# Primary submit button on every credential-collecting form.
doLogIn=Sign in

# Field labels — keep terse, lowercase-singular like the mockup.
username=Email
usernameOrEmail=Email
email=Email
password=Password

# Aux controls.
rememberMe=Remember me
doForgotPassword=Forgot password?

# Below-form invite-only block. We deliberately don't expose a register
# link; access is per-tenant via the admin Invite flow.
noAccount=No account yet?
inviteOnly=Access is invitation-only. Ask your admin to invite you.

# Update-password screen heading (executed by `execute-actions-email`
# UPDATE_PASSWORD — the path admin invites land on).
updatePasswordTitle=Set your AgriPulse password
passwordNew=New password
passwordConfirm=Confirm password
doSubmit=Set password

# Reset-password (forgot flow) heading + button.
emailForgotTitle=Reset your AgriPulse password
emailInstruction=Enter your email and we'll send you instructions.

# Verify-email screen.
emailVerifyTitle=Verify your email
emailVerifyInstruction1=Check your inbox — we sent a verification link to {0}.
emailVerifyInstruction2=Didn't get it? Resend below.
doClickHere=resend the email
