{{- /*
ExternalSecret feeding the PostSync promote-bootstrap Job.

Three values are required by `promote-kc-tenancy.py`:
  - TENANCY_CLIENT_SECRET → SM `agripulse/<env>/keycloak-client-secret`
  - BREVO_PASSWORD        → SM `agripulse/<env>/brevo-smtp-password`
  - BREVO_LOGIN           → static value (Brevo SMTP username); the
    Brevo account stays the same across envs, so we set it via chart
    values rather than SM. Override per overlay if it ever splits.

KEYCLOAK_PASSWORD comes from the existing `agripulse-keycloak-admin`
Secret (already managed by externalsecret-admin.yaml), wired into the
Job's `env:` list directly — no need for a second copy here.
*/ -}}
{{- if and .Values.promoteBootstrap.enabled .Values.externalSecrets.promote.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agripulse-keycloak-promote-bootstrap
  labels:
    {{- include "agripulse-keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: agripulse-keycloak-promote-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: TENANCY_CLIENT_SECRET
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-client-secret" .Values.global.env | quote }}
    - secretKey: BREVO_PASSWORD
      remoteRef:
        key: {{ printf "agripulse/%s/brevo-smtp-password" .Values.global.env | quote }}
{{- end }}
