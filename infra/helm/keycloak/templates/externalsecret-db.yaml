{{- if .Values.externalSecrets.db.enabled -}}
{{/*
CD-13. Syncs the per-env Keycloak DB password from AWS Secrets Manager
(`agripulse/<env>/keycloak-db-password`) into the k8s Secret consumed by
both:
  * the bitnami keycloak sub-chart's `externalDatabase.existingSecret`
  * the CNPG Cluster's `managed.roles.passwordSecret` reference for the
    `keycloak` role (rendered by the shared chart).

The shared chart's CNPG role-management block expects key `password`; the
bitnami keycloak chart's externalDatabase block expects whatever key is
named in `existingSecretPasswordKey` (we set it to `password` below).
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: missionagre-keycloak-db
  labels:
    app.kubernetes.io/name: missionagre-keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: missionagre
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: missionagre-keycloak-db
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-db-password" .Values.global.env | quote }}
{{- end }}
