{{- if .Values.externalSecrets.admin.enabled -}}
{{/*
CD-13. Syncs the per-env Keycloak bootstrap admin password from AWS
Secrets Manager (`agripulse/<env>/keycloak-admin-password`) into the
k8s Secret the bitnami keycloak sub-chart consumes via
`auth.existingSecret`. The chart expects a single key whose name is
configurable; we publish `admin_password` to stay consistent with the
existing dev wiring.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: missionagre-keycloak-admin
  labels:
    app.kubernetes.io/name: missionagre-keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: missionagre
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: missionagre-keycloak-admin
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        admin_password: "{{ "{{ .password }}" }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-admin-password" .Values.global.env | quote }}
{{- end }}
