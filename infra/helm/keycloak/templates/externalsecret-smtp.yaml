{{- if .Values.externalSecrets.smtp.enabled -}}
{{/*
CD-13 follow-up. Syncs per-env Brevo SMTP credentials from AWS Secrets
Manager (`agripulse/<env>/keycloak-smtp`) into a k8s Secret consumed by
the bitnami keycloak sub-chart via `extraEnvVarsSecret`.

The remote secret is a single JSON blob (one document keeps rotation
atomic — partial rotations across host/user/password would otherwise
silently break the realm). The shape is documented in
docs/runbooks/seeding-secrets.md § "keycloak-smtp":

  {
    "host":     "smtp-relay.brevo.com",
    "port":     "587",
    "username": "...",
    "password": "...",
    "from":     "noreply@agripulse.cloud",
    "starttls": "true"
  }

We extract each JSON property into a separately-named secret key
matching the realm-import placeholders (`${env:KC_SMTP_*}` in
files/agripulse-realm.json), so the bitnami chart loads them
verbatim as environment variables on the keycloak pod.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agripulse-keycloak-smtp
  labels:
    app.kubernetes.io/name: agripulse-keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: agripulse
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: agripulse-keycloak-smtp
    creationPolicy: Owner
  data:
    - secretKey: KC_SMTP_HOST
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-smtp" .Values.global.env | quote }}
        property: host
    - secretKey: KC_SMTP_PORT
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-smtp" .Values.global.env | quote }}
        property: port
    - secretKey: KC_SMTP_USERNAME
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-smtp" .Values.global.env | quote }}
        property: username
    - secretKey: KC_SMTP_PASSWORD
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-smtp" .Values.global.env | quote }}
        property: password
    - secretKey: KC_SMTP_FROM
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-smtp" .Values.global.env | quote }}
        property: from
    - secretKey: KC_SMTP_STARTTLS
      remoteRef:
        key: {{ printf "agripulse/%s/keycloak-smtp" .Values.global.env | quote }}
        property: starttls
{{- end }}
