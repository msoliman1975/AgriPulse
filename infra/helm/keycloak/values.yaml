# All Keycloak configuration goes through the bitnami sub-chart's values.
# We only override what production-shape requires. Defaults that are fine
# (PodDisruptionBudget, NetworkPolicy, ServiceMonitor) we leave alone.

# Mirrors infra/helm/shared/values.yaml; overlays override `global.envHost`.
# The bitnami sub-chart does not run values through `tpl`, so we cannot
# template the hostname directly â€” overlays must set
# `keycloak.ingress.hostname` AND `keycloak.extraEnvVars[KC_HOSTNAME]` per
# env (see overlays/<env>/values.yaml).
global:
  env: dev
  envHost: dev.agripulse.cloud

# CD-13: ExternalSecret wiring for the admin + DB passwords. Toggle each
# off only for unit-level `helm template` smoke testing â€” in real envs
# both must be on so the bitnami chart's existingSecret references resolve.
externalSecrets:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  admin:
    enabled: true
  db:
    enabled: true

keycloak:
  # Bitnami rotated the old `bitnami/keycloak:26.1.4-debian-12-r2` tag out
  # of docker.io/bitnami/* — pulls returned `not found` and the keycloak
  # pod went ImagePullBackOff. Repository tags continue to live on at
  # `docker.io/bitnamilegacy/*`. Pin the registry+repo+tag explicitly so a
  # silent upstream rotation can't break the dev cluster again.
  # `global.security.allowInsecureImages: true` is required to let the
  # bitnami chart's NOTES.txt guard accept a non-`bitnami/*` repository
  # (see https://github.com/bitnami/charts/issues/30850).
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/keycloak
    tag: 26.1.4-debian-12-r2

  # CD-13: HA topology. `production: true` flips the bitnami chart to the
  # Quarkus-`start` runtime (not `start-dev`), enables Infinispan
  # distributed cache automatically, and turns on TLS-aware proxy
  # behavior. Two replicas is the minimum for distributed-cache validity.
  replicaCount: 2
  production: true

  # Edge: TLS terminates at ingress-nginx and Keycloak speaks plain HTTP
  # behind it. With `production: true` the chart sets KC_PROXY=edge
  # automatically; setting `proxy` keeps the value explicit for review.
  proxy: edge

  # Cache: explicit Infinispan with the production cache stack. The
  # bitnami chart auto-sets this when `production: true`, but keeping it
  # explicit makes audits easier and the start-up args greppable.
  cache:
    enabled: true
    stack: kubernetes

  auth:
    # The bootstrap admin password is created in AWS Secrets Manager and
    # synced into k8s by the ExternalSecret in
    # templates/externalsecret-admin.yaml.
    existingSecret: agripulse-keycloak-admin
    passwordSecretKey: admin_password

  # Realm import: bake the agripulse realm into a ConfigMap and mount
  # it. CD-13 keeps the same JSON shipped in
  # `infra/helm/keycloak/files/agripulse-realm.json`. Production realm
  # updates flow via the runbook in docs/runbooks/keycloak-realm-update.md.
  extraStartupArgs: "--import-realm"
  extraVolumes:
    - name: realm-import
      configMap:
        name: agripulse-keycloak-realm
  extraVolumeMounts:
    - name: realm-import
      mountPath: /opt/bitnami/keycloak/data/import
      readOnly: true

  # CD-13: stable issuer URL. The bitnami chart maps
  # `ingress.hostname` â†’ KEYCLOAK_HOSTNAME (which becomes KC_HOSTNAME on
  # the server) and `ingress.hostnameStrict` â†’ KEYCLOAK_HOSTNAME_STRICT.
  # Strict mode rejects requests whose Host header doesn't match â€”
  # defense against host-confusion attacks and the only way to make sure
  # every access-token `iss` claim resolves to the same FQDN regardless
  # of which pod issued it. Overlays override `ingress.hostname` per env.
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: keycloak.dev.agripulse.cloud
    hostnameStrict: true
    tls: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging

  # Use the operator-managed Postgres rather than the bundled bitnami DB.
  # CD-13: the `keycloak` database is provisioned by the CNPG Cluster
  # via the shared chart's `postgresCluster.databases` block, and the
  # `keycloak` role's password lives in `agripulse-keycloak-db` (synced
  # by templates/externalsecret-db.yaml). Vendor is implied by `host`+
  # `port` but set explicitly so chart upgrades can't auto-switch.
  externalDatabase:
    vendor: postgresql
    host: agripulse-pg-rw
    port: 5432
    database: keycloak
    user: keycloak
    existingSecret: agripulse-keycloak-db
    existingSecretPasswordKey: password
  postgresql:
    enabled: false

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

  pdb:
    create: true
    minAvailable: 1
