image:
  repository: ghcr.io/msoliman1975/agripulse/tile-server
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

# See infra/helm/shared/values.yaml; overlays override `global.env` +
# `global.envHost`. Empty `images.tileServer.tag` seed for the CD-12
# imageRef helper (camelCase because the chart name has a hyphen).
global:
  env: dev
  envHost: dev.agripulse.cloud
  images:
    tileServer:
      tag: ""

replicaCount: 2
revisionHistoryLimit: 5

serviceAccount:
  create: true
  name: ""
  # IRSA: the role ARN is set per-env in the ApplicationSet overlay so
  # tile-server pods can read COGs from the imagery bucket directly.
  annotations: {}

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    cert-manager.io/cluster-issuer: letsencrypt-staging
  # Final host renders as `${hostPrefix}.${global.envHost}`.
  hostPrefix: tiles
  pathPrefix: /
  tlsSecretName: agripulse-tile-server-tls

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5

env:
  AWS_DEFAULT_REGION: me-south-1
  CORS_ALLOW_ORIGINS: "https://app.{{ .Values.global.envHost }}"
  DEFAULT_MAX_ZOOM: "22"
  DEFAULT_MIN_ZOOM: "0"
  GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
