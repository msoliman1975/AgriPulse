{{- if .Values.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "missionagre-tile-server.fullname" . }}
  labels:
    {{- include "missionagre-tile-server.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "missionagre-tile-server.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
