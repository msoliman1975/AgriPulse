image:
  repository: ghcr.io/msoliman1975/missionagre/frontend
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

# See infra/helm/shared/values.yaml; overlays override `global.env` +
# `global.envHost`.
global:
  env: dev
  envHost: dev.agripulse.cloud

replicaCount: 2
revisionHistoryLimit: 5

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
  # Final host renders as `${hostPrefix}.${global.envHost}`.
  hostPrefix: app
  tlsSecretName: missionagre-frontend-tls

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101 # nginx-unprivileged default
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    periodSeconds: 30
  readiness:
    httpGet:
      path: /healthz
      port: http
    periodSeconds: 10

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
