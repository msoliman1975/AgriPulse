{{- range $name, $workload := .Values.workloads -}}
{{- if and $workload.enabled $workload.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ printf "%s-%s" (include "agripulse-workers.fullname" $) $name }}
  labels:
    {{- include "agripulse-workers.labels" $ | nindent 4 }}
spec:
  minAvailable: {{ $workload.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "agripulse-workers.selectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
{{- end }}
{{- end }}
