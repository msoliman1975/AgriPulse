image:
  repository: ghcr.io/msoliman1975/missionagre/api
  tag:
    "" # Empty → falls back to .Chart.AppVersion. Workers
    # share the API image to keep migrations and code
    # paths in lockstep.
  pullPolicy: IfNotPresent
imagePullSecrets: []

# See infra/helm/shared/values.yaml; overlays override `global.env` +
# `global.envHost`. Empty `images.workers.tag` seed for the CD-12
# imageRef helper.
global:
  env: dev
  envHost: dev.agripulse.cloud
  images:
    workers:
      tag: ""

revisionHistoryLimit: 5

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# Same env as the API; the worker uses settings.py to find Celery broker,
# DB, etc. Per-env overlays override hosts.
env:
  APP_ENV: production
  APP_LOG_LEVEL: INFO
  DATABASE_URL: postgresql+asyncpg://missionagre@missionagre-pg-rw:5432/missionagre
  DATABASE_SYNC_URL: postgresql+psycopg://missionagre@missionagre-pg-rw:5432/missionagre
  REDIS_URL: redis://missionagre-redis:6379/0
  CELERY_BROKER_URL: redis://missionagre-redis:6379/1
  CELERY_RESULT_BACKEND: redis://missionagre-redis:6379/2
  KEYCLOAK_ISSUER: "https://keycloak.{{ .Values.global.envHost }}/realms/missionagre"
  KEYCLOAK_AUDIENCE: missionagre-api
  KEYCLOAK_JWKS_URL: "https://keycloak.{{ .Values.global.envHost }}/realms/missionagre/protocol/openid-connect/certs"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.observability.svc.cluster.local:4318

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  remoteRef:
    key: missionagre/api # Same secret as API; keeps DB password in sync.
  data:
    - secretKey: DATABASE_PASSWORD
      property: database_password
    - secretKey: KEYCLOAK_CLIENT_SECRET
      property: keycloak_client_secret
    - secretKey: AWS_ACCESS_KEY_ID
      property: aws_access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      property: aws_secret_access_key
  # CD-9 per-purpose secrets at `agripulse/<env>/<purpose>`. SMTP is
  # included here because workers send notification email too — keeping
  # this in sync with the API chart is the documented gotcha in
  # docs/runbooks/seeding-secrets.md.
  crossRefs:
    - secretKey: SMTP_PASSWORD
      remoteKey: "agripulse/{{ .Values.global.env }}/brevo-smtp-password"
    - secretKey: JWT_SIGNING_KEY
      remoteKey: "agripulse/{{ .Values.global.env }}/jwt-signing-key"
    - secretKey: SENTINEL_HUB_CLIENT_SECRET
      remoteKey: "agripulse/{{ .Values.global.env }}/sentinel-hub-client-secret"

# Three workloads off the same image. light/heavy queues are conventional
# names per ARCHITECTURE.md § 3.1; beat is the singleton scheduler.
workloads:
  light:
    enabled: true
    replicaCount: 2
    command:
      - celery
      - --app
      - workers.light.main:celery_app
      - worker
      - --loglevel=INFO
      - --queues=light
      - --concurrency=4
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
    pdb:
      enabled: true
      minAvailable: 1
  heavy:
    enabled: true
    replicaCount: 1
    command:
      - celery
      - --app
      - workers.heavy.main:celery_app
      - worker
      - --loglevel=INFO
      - --queues=heavy
      - --concurrency=2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    pdb:
      enabled: false # Singleton-ish; PDB would block evictions.
  beat:
    enabled: true
    replicaCount: 1 # Beat is a true singleton.
    command:
      - celery
      - --app
      - workers.beat.main:celery_app
      - beat
      - --loglevel=INFO
      - --schedule=/tmp/celerybeat-schedule
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    pdb:
      enabled: false

probes:
  liveness:
    exec:
      command:
        [
          "sh",
          "-c",
          "celery --app workers.light.main:celery_app inspect ping -d celery@$HOSTNAME || true",
        ]
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
