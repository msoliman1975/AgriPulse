# staging environment overrides. Tracks production layout but with
# smaller resource asks so cost stays sane during pre-release runs.
labels:
  partOf: missionagre

replicaCount: 2

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: api.staging.missionagre.io

postgresCluster:
  instances: 2
  storage:
    size: 50Gi
  walStorage:
    size: 15Gi
  backup:
    enabled: true
    barmanObjectStore:
      destinationPath: s3://missionagre-pg-backups-staging
    retentionPolicy: "14d"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
