# staging environment overrides. Tracks production layout but with
# smaller resource asks so cost stays sane during pre-release runs.
#
# How this file is consumed: every chart in the missionagre-services
# AppSet is rendered with chart-default values + this overlay layered
# on top. Charts only read the keys they reference, so chart-specific
# blocks (`workloads:`, `keycloak:`) at the top level are fine.

# Used by the shared chart to template the CNPG backup `destinationPath`
# (s3://agripulse-pg-backup-<env>/pg) and by each service chart's
# `${hostPrefix}.${global.envHost}` Ingress rendering.
global:
  env: staging
  envHost: staging.agripulse.cloud
  # CD-12 per-image tag map. Staging is NOT auto-bumped — promotion to
  # this overlay is a hand-written PR after dev smoke testing. Keys are
  # present so the chart helper's lookup is safe.
  images:
    api:
      tag: ""
    workers:
      tag: ""
    frontend:
      tag: ""
    tileServer:
      tag: ""

labels:
  partOf: missionagre

# api / frontend / tile-server top-level deployments. Two replicas is
# enough for a real load-balanced rolling deploy without paying the
# 3-AZ HA tax of production.
replicaCount: 2

# Per-chart host renders as `${hostPrefix}.${global.envHost}` (e.g.
# api.staging.agripulse.cloud, app.staging.agripulse.cloud).
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging

# Keycloak chart's bitnami sub-chart does not tpl values, so its hostname
# must be set explicitly per env.
keycloak:
  ingress:
    hostname: keycloak.staging.agripulse.cloud
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging

# IRSA ARNs filled in by bootstrap (terraform output iam_role_arns).
externalDns:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

# Karpenter (CD-8). clusterName + nodeIAMRoleName come from
# `terraform output karpenter`.
karpenter:
  enabled: true
  clusterName: missionagre-staging
  nodeIAMRoleName: missionagre-staging-karpenter-node

certManagerController:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

# CNPG: 2 instances — enough to validate failover during soak runs
# without burning prod-shape spend.
postgresCluster:
  instances: 2
  storage:
    size: 50Gi
  walStorage:
    size: 15Gi
  backup:
    enabled: true
    retentionPolicy: "14d"
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: ""

# api / frontend / tile-server resource shape. Smaller than prod —
# staging is for smoke + soak, not load.
resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 1Gi

# HPA on api in staging too, just with a lower ceiling. Lets us
# exercise the autoscaling path before prod sees it.
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

# Per-env api IRSA binding. ARN comes from
# `terraform output agripulse_env_resources` → .staging.api_irsa_arn.
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""

# Per-queue worker sizing. Same shape as prod but smaller asks.
workloads:
  light:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    pdb:
      enabled: true
      minAvailable: 1
  heavy:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    pdb:
      enabled: false
  beat:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    pdb:
      enabled: false
