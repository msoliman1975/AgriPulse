# staging environment overrides. Tracks production layout but with
# smaller resource asks so cost stays sane during pre-release runs.

# Used by the shared chart to template the CNPG backup `destinationPath`
# (s3://agripulse-pg-backup-<env>/pg) and by each service chart's
# `${hostPrefix}.${global.envHost}` Ingress rendering.
global:
  env: staging
  envHost: staging.agripulse.cloud

labels:
  partOf: missionagre

replicaCount: 2

# Per-chart host renders as `${hostPrefix}.${global.envHost}` (e.g.
# api.staging.agripulse.cloud, app.staging.agripulse.cloud).
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging

# Keycloak chart's bitnami sub-chart does not tpl values, so its hostname
# must be set explicitly per env.
keycloak:
  ingress:
    hostname: keycloak.staging.agripulse.cloud
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging

# IRSA ARNs filled in by bootstrap (terraform output iam_role_arns).
externalDns:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

# Karpenter (CD-8). clusterName + nodeIAMRoleName come from
# `terraform output karpenter`.
karpenter:
  enabled: true
  clusterName: missionagre-staging
  nodeIAMRoleName: missionagre-staging-karpenter-node

certManagerController:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

postgresCluster:
  instances: 2
  storage:
    size: 50Gi
  walStorage:
    size: 15Gi
  backup:
    enabled: true
    retentionPolicy: "14d"
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: ""

# Per-env api IRSA binding. ARN comes from
# `terraform output agripulse_env_resources` → .staging.api_irsa_arn.
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
