# dev environment overrides for the agripulse-services ApplicationSet.
# Values here override `infra/helm/<chart>/values.yaml` defaults.

# Used by the shared chart to template the CNPG backup `destinationPath`
# (s3://agripulse-pg-backup-<env>/pg) and by each service chart's
# `${hostPrefix}.${global.envHost}` Ingress rendering.
global:
  env: dev
  envHost: dev.agripulse.cloud
  # Per-image tag map maintained by .github/workflows/argocd-sync.yml.
  # CD-12: the loop bumps each chart independently â€” the old single
  # `image.tag` left tile-server stuck. yq writes here directly; empty
  # string falls back to .Chart.AppVersion so a fresh checkout still
  # renders. Only the dev overlay is auto-bumped; staging/production
  # promotion is hand-written.
  # Pinned to the latest main SHA where the CI `containers` matrix passed
  # (commit 858949d, 2026-05-17 — first multi-arch run after BH-1..BH-4).
  # The auto-bump workflow in `.github/workflows/argocd-sync.yml` only
  # fires when the CI workflow as a whole goes green — backend ruff and
  # frontend eslint + pre-commit are currently red, so dev tags are
  # bumped by hand until that's fixed.
  images:
    api:
      tag: "858949d"
    workers:
      tag: "858949d"
    frontend:
      tag: "858949d"
    tileServer:
      tag: "858949d"

# Per-env env-var overrides. Top-level `env:` merges into each chart's
# own env map (api + workers both consume it; harmless for charts that
# don't read these keys).
env:
  # Must match the Keycloak realm import's seed user
  # (infra/helm/keycloak/files/agripulse-realm.json → users[0].email),
  # otherwise the JWT email won't match the platform_role_assignments
  # row the bootstrap creates and login lands in tenant-user mode
  # instead of PlatformAdmin.
  PLATFORM_ADMIN_EMAIL: dev@agripulse.local
  PLATFORM_ADMIN_FULL_NAME: Platform Admin
  # Sentinel Hub OAuth client_id for the dev account. The matching
  # client_secret is in AWS Secrets Manager at
  # agripulse/dev/sentinel-hub-client-secret. Fill from the 1Password
  # entry "agripulse/sentinel-hub-dev" — must be the UUID that pairs with
  # whatever was loaded into SM, otherwise discover_scenes still fails
  # at the OAuth token call (401), not at startup.
  SENTINEL_HUB_CLIENT_ID: "67611d57-1a8d-4833-9a7b-02abde5b23b8"

# Common knobs across charts.
labels:
  partOf: agripulse

# Smaller footprint, single-AZ tolerable.
replicaCount: 1

# cert-manager issues against the prod Let's Encrypt directory so the
# certs are browser-trusted (Netskope MITM rejects the staging chain).
# Rate limits: 50 certs/week per registered domain — fine for dev where
# we have ~5 hostnames and rarely reissue. The Ingress hostname per
# service is rendered from `${ingress.hostPrefix}.${global.envHost}`
# inside each service chart; overlays only flip the env-wide suffix.
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

# Keycloak chart's bitnami sub-chart does not tpl values, so its hostname
# must be set explicitly per env. CD-13: `ingress.hostnameStrict` flows
# into KEYCLOAK_HOSTNAME_STRICT so the issuer URL is pinned (every JWT
# `iss` and OIDC discovery doc resolves to this FQDN regardless of which
# pod served the request).
keycloak:
  ingress:
    hostname: keycloak.dev.agripulse.cloud
    hostnameStrict: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

# ExternalDNS + cert-manager IRSA ARNs come from `terraform output
# iam_role_arns` (keys: external_dns, cert_manager). Filled in by the
# bootstrap step in CD-10.
externalDns:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::328972548541:role/agripulse-dev-external-dns"

# Karpenter (CD-8). clusterName + nodeIAMRoleName come from
# `terraform output karpenter`.
karpenter:
  enabled: true
  clusterName: agripulse-dev
  nodeIAMRoleName: agripulse-dev-karpenter-node

certManagerController:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::328972548541:role/agripulse-dev-cert-manager"

# Per-env api IRSA binding. ARN comes from
# `terraform output agripulse_env_resources` â†’ .dev.api_irsa_arn.
# Filled in at deploy time by CD-10 bootstrap.
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::328972548541:role/agripulse-api-irsa-dev"

# Dev DB is the same cluster CNPG instance, just smaller. CNPG IRSA ARN
# comes from `terraform output agripulse_env_resources` â†’ .dev.cnpg_irsa_arn.
postgresCluster:
  instances: 1
  storage:
    size: 20Gi
  walStorage:
    size: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::328972548541:role/agripulse-cnpg-irsa-dev"

# Alembic PreSync Job (api chart only â€” other charts ignore this key).
# The Job runs `alembic upgrade head` before any Deployment rolls; failure
# blocks the sync and the previous version keeps serving. Runbook:
# docs/runbooks/failed-migration-recovery.md.
migrations:
  enabled: true

# Tighter resources across services in dev.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
