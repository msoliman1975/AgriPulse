# dev environment overrides for the missionagre-services ApplicationSet.
# Values here override `infra/helm/<chart>/values.yaml` defaults.

# Used by the shared chart to template the CNPG backup `destinationPath`
# (s3://agripulse-pg-backup-<env>/pg) and by each service chart's
# `${hostPrefix}.${global.envHost}` Ingress rendering.
global:
  env: dev
  envHost: dev.agripulse.cloud
  # Per-image tag map maintained by .github/workflows/argocd-sync.yml.
  # CD-12: the loop bumps each chart independently — the old single
  # `image.tag` left tile-server stuck. yq writes here directly; empty
  # string falls back to .Chart.AppVersion so a fresh checkout still
  # renders. Only the dev overlay is auto-bumped; staging/production
  # promotion is hand-written.
  images:
    api:
      tag: ""
    workers:
      tag: ""
    frontend:
      tag: ""
    tileServer:
      tag: ""

# Common knobs across charts.
labels:
  partOf: missionagre

# Smaller footprint, single-AZ tolerable.
replicaCount: 1

# cert-manager issues against the staging Let's Encrypt directory so we
# don't burn prod rate limits. The Ingress hostname per service is rendered
# from `${ingress.hostPrefix}.${global.envHost}` inside each service chart;
# overlays only flip the env-wide suffix.
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging

# Keycloak chart's bitnami sub-chart does not tpl values, so its hostname
# must be set explicitly per env.
keycloak:
  ingress:
    hostname: keycloak.dev.agripulse.cloud
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging

# ExternalDNS + cert-manager IRSA ARNs come from `terraform output
# iam_role_arns` (keys: external_dns, cert_manager). Filled in by the
# bootstrap step in CD-10.
externalDns:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

# Karpenter (CD-8). clusterName + nodeIAMRoleName come from
# `terraform output karpenter`.
karpenter:
  enabled: true
  clusterName: missionagre-dev
  nodeIAMRoleName: missionagre-dev-karpenter-node

certManagerController:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

# Per-env api IRSA binding. ARN comes from
# `terraform output agripulse_env_resources` → .dev.api_irsa_arn.
# Filled in at deploy time by CD-10 bootstrap.
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""

# Dev DB is the same cluster CNPG instance, just smaller. CNPG IRSA ARN
# comes from `terraform output agripulse_env_resources` → .dev.cnpg_irsa_arn.
postgresCluster:
  instances: 1
  storage:
    size: 20Gi
  walStorage:
    size: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: ""

# Alembic PreSync Job (api chart only — other charts ignore this key).
# The Job runs `alembic upgrade head` before any Deployment rolls; failure
# blocks the sync and the previous version keeps serving. Runbook:
# docs/runbooks/failed-migration-recovery.md.
migrations:
  enabled: true

# Tighter resources across services in dev.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
