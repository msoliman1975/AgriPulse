# dev environment overrides shared across every chart in the
# missionagre-services ApplicationSet. Per-chart overrides live in
# charts/<chart>.yaml and are loaded after this file so they win.

# Common knobs across charts.
labels:
  partOf: missionagre

# Smaller footprint, single-AZ tolerable.
replicaCount: 1

# Hosts use the dev wildcard; cert-manager issues against the staging
# Let's Encrypt directory so we don't burn prod rate limits.
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  host: api.dev.missionagre.local

# Tighter resources across services in dev.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
