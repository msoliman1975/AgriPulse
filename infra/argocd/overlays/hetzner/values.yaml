# Hetzner (single-node k3s) environment overrides for the agripulse-services
# ApplicationSet. Forked from overlays/dev/values.yaml with every AWS-IRSA
# binding stripped — on Hetzner there is no IRSA; cloud creds (Cloudflare R2,
# Cloudflare DNS) are supplied as plain Kubernetes Secrets.
#
# STATUS: scaffold. Lines marked `# TODO(hetzner-live)` need the real cluster
# to validate (chart rendering, CNPG R2 backup, cert issuance) and the actual
# secret values. To wire Hetzner into deployment, add `env: hetzner` to the
# generator list in infra/argocd/appsets/services.yaml.
global:
  env: hetzner
  # Prod domain — no `dev.` prefix. Each service Ingress renders
  # `${ingress.hostPrefix}.${global.envHost}`.
  envHost: agripulse.cloud
  # Pin to the SHAs actually running on the live cluster (hand-written
  # promotion — NOT auto-bumped like dev). frontend is a separate build
  # (8a92127, prod VITE_ URLs); api/workers/tile share 9d140cc.
  images:
    api:
      tag: "9d140cc"
    workers:
      tag: "9d140cc"
    frontend:
      tag: "8a92127"
    tileServer:
      tag: "9d140cc"
# Top-level env merges into every service chart's own env map (api + workers
# consume all of these; tile-server/frontend ignore the keys they don't read).
env:
  # PlatformAdmin identity MUST equal the Keycloak realm seed user
  # (agripulse-realm.json users[0].email = dev@agripulse.local), else the JWT
  # email won't match the platform_role_assignments row the bootstrap seeds
  # and login lands in tenant-user mode instead of PlatformAdmin. Switching to
  # a real admin email is a separate change that also reseeds the realm user.
  PLATFORM_ADMIN_EMAIL: dev@agripulse.local
  PLATFORM_ADMIN_FULL_NAME: Platform Admin
  SENTINEL_HUB_CLIENT_ID: "67611d57-1a8d-4833-9a7b-02abde5b23b8"
  # Keycloak split-URL (Hetzner only): the public issuer host
  # keycloak.agripulse.cloud does NOT resolve inside the cluster, so only
  # KEYCLOAK_ISSUER (must match the JWT `iss`) stays public (chart default via
  # envHost); api/workers reach Keycloak over in-cluster DNS for token + JWKS.
  KEYCLOAK_BASE_URL: http://keycloak
  KEYCLOAK_JWKS_URL: http://keycloak/realms/agripulse/protocol/openid-connect/certs
  # Object storage = Cloudflare R2 (S3-compatible): region "auto" and a single
  # bucket with no per-env suffix. Endpoint + access keys arrive via the
  # agripulse-app-secrets Secret (envFrom), not here.
  S3_REGION: auto
  S3_BUCKET_UPLOADS: agripulse-imagery
  AWS_DEFAULT_REGION: auto
  # No Tempo on Hetzner — disable OTEL so the SDK doesn't retry-storm a
  # non-existent OTLP collector.
  OTEL_SDK_DISABLED: "true"
# Plain Secrets loaded via envFrom (ESO is off; these are hand-seeded). The
# single shared overlay applies to every service chart, so api/workers/tile
# all load both — harmless (same R2 account creds; unused keys are ignored).
# Per-chart scoping would need per-chart value files (a #5 refinement).
extraEnvFromSecrets:
  - agripulse-app-secrets
  - agripulse-r2-gdal
# No External Secrets Operator on Hetzner — secrets seeded directly.
# `externalSecret` (api/workers) gates the ExternalSecret CR; `externalSecrets`
# (shared) gates the ClusterSecretStore. Both off.
externalSecret:
  enabled: false
externalSecrets:
  enabled: false # shared chart ClusterSecretStore
  # keycloak wrapper-chart ExternalSecrets (admin/db/promote) — ESO is off on
  # Hetzner, so these CRs would fail to apply (no external-secrets.io CRD).
  admin:
    enabled: false
  db:
    enabled: false
  promote:
    enabled: false
# No prometheus-operator on Hetzner → ServiceMonitor CRD absent; rendering one
# would fail to apply. (CNPG's PodMonitor is gated separately below.)
serviceMonitor:
  enabled: false
labels:
  partOf: agripulse
# Single node, no HA.
replicaCount: 1
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
keycloak:
  ingress:
    hostname: keycloak.agripulse.cloud
    hostnameStrict: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  image:
    tag: "9d140cc"
  # No prometheus-operator on Hetzner → ServiceMonitor CRD absent.
  metrics:
    serviceMonitor:
      enabled: false
  # Live keycloak has no NetworkPolicy; the bitnami default would create one
  # that restricts traffic. Keep it off (single node, ingress-nginx fronts it).
  networkPolicy:
    enabled: false
# Promote-bootstrap PostSync hook reaches Keycloak in-cluster. On Hetzner the
# bitnami Service is `keycloak` (release name), not the chart default
# `keycloak-dev` (the old AWS App name) — point the hook at the right host.
promoteBootstrap:
  # Re-enabled with failOnError:false (the FOLLOW-UP the disabled note called
  # for). The original concern — a failed PostSync hook blocking the keycloak
  # sync when Keycloak is briefly unreachable — is now addressed: failOnError
  # false turns any step failure (or KC-unreachable) into a logged warning +
  # clean exit 0, so the sync is never blocked. The scripts are idempotent.
  #
  # Why it's needed: without it the agripulse-tenancy service-account client
  # keeps the realm-import PLACEHOLDER secret, so the api can't get an admin
  # token (401 unauthorized_client) and tenant provisioning fails. promote-kc-
  # tenancy.py sets the client secret from the hand-seeded TENANCY_CLIENT_SECRET
  # and is self-contained (httpx only), so it works even while the pinned api
  # image predates the promote-kc-admin.py dev_bootstrap helpers (that step just
  # logs a non-fatal warning until the image is promoted).
  enabled: true
  failOnError: false
  keycloakBaseUrl: http://keycloak
# external-dns on Cloudflare instead of Route53. No IRSA — the chart reads a
# Cloudflare API token from a Secret.
# TODO(hetzner-live): set provider=cloudflare + reference the CF token secret;
# confirm the external-dns chart values support it (or drop external-dns and
# manage the handful of records by hand in Cloudflare).
externalDns:
  serviceAccount:
    annotations: {}
# No cluster autoscaler on a fixed VM.
karpenter:
  enabled: false
# cert-manager: no IRSA. Single-node k3s with ports 80/443 public on the node,
# so HTTP-01 through ingress-nginx is the simplest issuer (no Cloudflare DNS
# token needed). This overrides the shared chart's AWS default (DNS-01 via
# Route53), matching the live cert-manager install + the two ClusterIssuers
# created this session. The ingress.annotations.cert-manager.io/cluster-issuer
# below + each service chart's rendered spec.tls block let ingress-shim
# auto-issue, replacing the manual /root/enable-tls.sh.
certManager:
  enabled: true
  acme:
    # Matches the live ACME account registration (avoids re-registering on the
    # GitOps cutover). LE only uses this for expiry notices.
    email: mohamed75soliman@gmail.com
    solvers:
      - http01:
          ingress:
            class: nginx
certManagerController:
  serviceAccount:
    annotations: {}
# api: no IRSA. R2 (S3-compatible) creds come from a Secret as env vars.
# TODO(hetzner-live): drop the IRSA SA annotation (done) and confirm the api
# chart reads R2 endpoint/key/secret from env rather than instance role.
serviceAccount:
  create: true
  annotations: {}
postgresCluster:
  instances: 1
  # The keycloak DB already exists on the adopted cluster, and this PostSync
  # hook (CREATE DATABASE IF NOT EXISTS) would re-run on every ArgoCD reconcile
  # — same hook-churn class as the promote hook. Off for adoption; re-enable for
  # from-scratch reproducibility.
  keycloakDbBootstrap:
    enabled: false
  # k3s local-path provisioner (repointed at the detachable volume /mnt/pgdata
  # by 02-node-bootstrap.sh) — overrides the chart's AWS gp3 default.
  storage:
    size: 100Gi
    storageClass: local-path
  walStorage:
    size: 30Gi
    storageClass: local-path
  # Match the live cluster (chart default 4Gi/8Gi) so adoption doesn't restart
  # the single PG instance (= brief full-app downtime). Tune later in a window.
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi
  # No IRSA on Hetzner.
  serviceAccountAnnotations: {}
  # No prometheus-operator → no PodMonitor CRD. CNPG tolerates the missing CRD
  # (warns) but gate it off for a clean apply.
  monitoring:
    enablePodMonitor: false
  # Barman backups → Cloudflare R2 via static S3 creds from the agripulse-r2
  # Secret (no IRSA). Single bucket, no per-env suffix. endpointURL carries
  # only the CF account id (an identifier, not a credential — the R2 access
  # keys live in the agripulse-r2 Secret), so it is safe to commit and keeps
  # the CNPG backup fully GitOps-managed.
  backup:
    barmanObjectStore:
      destinationPath: "s3://agripulse-pg-backup/pg"
      endpointURL: "https://83c91caacdfd03a1e6cb07e4fdf882a4.r2.cloudflarestorage.com"
      s3Credentials:
        inheritFromIAMRole: false
        secretName: agripulse-r2
        accessKeyIdKey: ACCESS_KEY_ID
        secretAccessKeyKey: SECRET_ACCESS_KEY
migrations:
  enabled: true
# Keep each chart's own resources (api 512Mi, tile-server 2Gi for GDAL, etc.) —
# the cx43 node (8 vCPU / 16 GiB) fits them, and the live cluster runs on these.
# A blanket override here would shrink tile-server to 256Mi and OOM GDAL.
# Single light-worker replica (matches live; chart default is 2).
workloads:
  light:
    replicaCount: 1
