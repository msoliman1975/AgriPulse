# production environment overrides. ARCHITECTURE.md § 3.2 commits the
# baseline resource shapes; tune carefully and only with an ADR for
# anything that changes scale or reliability assumptions.

# Used by the shared chart to template the CNPG backup `destinationPath`.
global:
  env: prod

labels:
  partOf: missionagre

replicaCount: 3

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: api.agripulse.cloud

# IRSA ARNs filled in by bootstrap (terraform output iam_role_arns).
externalDns:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

# Karpenter (CD-8). clusterName + nodeIAMRoleName come from
# `terraform output karpenter`.
karpenter:
  enabled: true
  clusterName: missionagre-production
  nodeIAMRoleName: missionagre-production-karpenter-node

certManagerController:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""

postgresCluster:
  instances: 2
  storage:
    size: 200Gi
  walStorage:
    size: 60Gi
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 16Gi
  backup:
    enabled: true
    retentionPolicy: "90d"
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: true

# Per-env api IRSA binding. ARN comes from
# `terraform output agripulse_env_resources` → .prod.api_irsa_arn.
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""
