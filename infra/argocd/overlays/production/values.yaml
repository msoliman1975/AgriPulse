# production environment overrides. ARCHITECTURE.md § 3.2 commits the
# baseline resource shapes; tune carefully and only with an ADR for
# anything that changes scale or reliability assumptions.
labels:
  partOf: missionagre

replicaCount: 3

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: api.missionagre.io

postgresCluster:
  instances: 2
  storage:
    size: 200Gi
  walStorage:
    size: 60Gi
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 16Gi
  backup:
    enabled: true
    barmanObjectStore:
      destinationPath: s3://missionagre-pg-backups-prod
    retentionPolicy: "90d"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: true
