# production overrides for the missionagre-shared chart.

postgresCluster:
  instances: 2
  storage:
    size: 200Gi
  walStorage:
    size: 60Gi
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 16Gi
  backup:
    enabled: true
    barmanObjectStore:
      destinationPath: s3://missionagre-pg-backups-prod
    retentionPolicy: "90d"
