---
# Generates one Application per (service chart Ã— environment). Six charts Ã—
# three environments = 18 Applications. Each Application uses the chart at
# `infra/helm/<chart>` and overlays `infra/argocd/overlays/<env>/values.yaml`.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agripulse-services
  namespace: argocd
spec:
  # Required for Go template syntax (`{{.chart}}`, `{{.env}}`) below.
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - chart: shared
                - chart: api
                - chart: workers
                - chart: tile-server
                - chart: frontend
                - chart: keycloak
          - list:
              elements:
                # Native YAML booleans (no quotes) so templatePatch below
                # renders them as proper bool, not string.
                - env: dev
                  namespace: agripulse
                  prune: true
                - env: staging
                  namespace: agripulse
                  prune: false
                - env: production
                  namespace: agripulse
                  prune: false
  template:
    metadata:
      name: "{{.chart}}-{{.env}}"
      labels:
        app.kubernetes.io/part-of: agripulse
        agripulse.cloud/env: "{{.env}}"
        agripulse.cloud/chart: "{{.chart}}"
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      source:
        repoURL: https://github.com/msoliman1975/AgriPulse.git
        targetRevision: HEAD
        path: "infra/helm/{{.chart}}"
        helm:
          valueFiles:
            - "values.yaml"
            - "../../argocd/overlays/{{.env}}/values.yaml"
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
  # Inline template fields are stringly-typed; templatePatch is the only
  # way to render a real boolean into syncPolicy.automated.prune.
  templatePatch: |
    spec:
      syncPolicy:
        automated:
          prune: {{ .prune }}
