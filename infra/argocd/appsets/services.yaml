---
# Generates one Application per (service chart Ã— environment). Six charts Ã—
# three environments = 18 Applications. Each Application uses the chart at
# `infra/helm/<chart>` and overlays `infra/argocd/overlays/<env>/values.yaml`.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agripulse-services
  namespace: argocd
spec:
  # Required for Go template syntax (`{{.chart}}`, `{{.env}}`) below.
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # releaseName MUST match the live manual-deploy release names so
                # ArgoCD adopts the existing resources in place instead of
                # creating duplicates (fullname = <releaseName>-<chartName>).
                # These are non-uniform because the hand deploys were; shared's
                # resources are fixed-name so its releaseName is free.
                - chart: shared
                  releaseName: agripulse
                - chart: api
                  releaseName: agripulse-api
                - chart: workers
                  releaseName: workers
                - chart: tile-server
                  releaseName: tile-server
                - chart: frontend
                  releaseName: frontend
                - chart: keycloak
                  releaseName: keycloak
          - list:
              elements:
                # Native YAML booleans (no quotes) so templatePatch below
                # renders them as proper bool, not string.
                #
                # Was originally a 3-env matrix (dev/staging/production) =
                # 18 Applications, but the single cluster has no real
                # staging or production destinations and the zombie Apps
                # were confusing triage. When real staging/production
                # clusters land, add a destination.server per env (probably
                # via a third generator) and put those envs back here.
                # Single in-cluster destination = the Hetzner k3s node (AWS/dev
                # is decommissioned). Only one env may be active here since they
                # all target https://kubernetes.default.svc.
                - env: hetzner
                  namespace: agripulse
                  prune: true
  template:
    metadata:
      name: "{{.chart}}-{{.env}}"
      labels:
        app.kubernetes.io/part-of: agripulse
        agripulse.cloud/env: "{{.env}}"
        agripulse.cloud/chart: "{{.chart}}"
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      source:
        repoURL: https://github.com/msoliman1975/AgriPulse.git
        targetRevision: HEAD
        path: "infra/helm/{{.chart}}"
        helm:
          releaseName: "{{.releaseName}}"
          valueFiles:
            - "values.yaml"
            - "../../argocd/overlays/{{.env}}/values.yaml"
      # CNPG's bootstrap is immutable post-init; the shared chart now renders a
      # corrected bootstrap (SUPERUSER + postInitApplicationSQL split) that
      # differs from what the live cluster was created with. Ignore it on
      # adoption so ArgoCD doesn't sit perpetually OutOfSync or trip the CNPG
      # webhook. Only the `shared` app carries a CNPG Cluster; harmless elsewhere.
      ignoreDifferences:
        - group: postgresql.cnpg.io
          kind: Cluster
          # CNPG reconciles these itself and normalizes them away from what the
          # chart renders, so they sit perpetually OutOfSync otherwise:
          #  - /spec/bootstrap: create-only/immutable (CNPG adds encoding/locale).
          #  - /spec/managed: CNPG stores roles with connectionLimit + omits the
          #    explicit false superuser/createdb/createrole the chart renders.
          jsonPointers:
            - /spec/bootstrap
            - /spec/managed
      syncPolicy:
        automated:
          # Auto-revert drift. prune stays OFF: this appset includes the `shared`
          # chart which carries the CNPG Cluster — never let GitOps auto-delete
          # the database. Removals are handled by a deliberate manual sync.
          selfHeal: true
          prune: false
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - RespectIgnoreDifferences=true
