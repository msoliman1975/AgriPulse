---
# Pre-creates the self-signed Issuer that external-secrets' webhook
# Certificate references. Synced at wave -1 (before platform charts at
# wave 0) so the Issuer exists by the time cert-manager processes the
# CertificateRequest the ESO chart emits. See external-secrets-bootstrap/
# issuer.yaml for the reason this isn't bundled with the chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-external-secrets-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  source:
    repoURL: https://github.com/msoliman1975/AgriPulse.git
    targetRevision: HEAD
    path: infra/argocd/external-secrets-bootstrap
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
