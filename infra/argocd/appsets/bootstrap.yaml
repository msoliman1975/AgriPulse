---
# AppOfApps. Apply once into the `argocd` namespace; ArgoCD then creates
# the three child ApplicationSets which spawn the per-env Applications.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agripulse-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/msoliman1975/AgriPulse.git
    targetRevision: HEAD
    path: infra/argocd/appsets
    directory:
      recurse: false
      # cnpg-crds.yaml is a standalone Application (not an AppSet) that
      # vendors the cloudnative-pg operator's CRDs ahead of the chart;
      # see that file's header for why.
      include: "{services.yaml,platform.yaml,observability.yaml,cnpg-crds.yaml,external-secrets-bootstrap.yaml,storageclass-bootstrap.yaml}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
