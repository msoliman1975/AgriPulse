---
# AppOfApps. Apply once into the `argocd` namespace; ArgoCD then creates
# the three child ApplicationSets which spawn the per-env Applications.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agripulse-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/msoliman1975/AgriPulse.git
    targetRevision: HEAD
    path: infra/argocd/appsets
    directory:
      recurse: false
      # cnpg-crds.yaml and kube-prometheus-stack-crds.yaml are standalone
      # Applications (not AppSets) that vendor CRDs ahead of their charts
      # to break first-boot chicken-and-egg cycles; see each file's
      # header for why.
      include: "{services.yaml,platform.yaml,observability.yaml,cnpg-crds.yaml,kube-prometheus-stack-crds.yaml,external-secrets-bootstrap.yaml,storageclass-bootstrap.yaml}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
