controller:
  replicaCount: 2
  # Schedules on the baseline managed node group; Karpenter would not be
  # able to provision a node for ingress-nginx before there's a Service.
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  admissionWebhooks:
    # The admission webhook's caBundle is filled by a one-shot patch
    # Job (see chart's admission-webhooks/job-patch.yaml). On a fresh
    # install with `patch.enabled=false`, the caBundle stays empty and
    # every Ingress apply fails with `x509: certificate signed by
    # unknown authority`. Keep enabled to make the bootstrap reproducible.
    enabled: true
    patch:
      enabled: true
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
  service:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
