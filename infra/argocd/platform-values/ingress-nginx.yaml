controller:
  replicaCount: 2
  # Schedules on the baseline managed node group; Karpenter would not be
  # able to provision a node for ingress-nginx before there's a Service.
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  service:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
