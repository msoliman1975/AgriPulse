# Karpenter controller. Real IRSA ARN + cluster + queue name are injected
# at deploy time from `terraform output karpenter` â€” overlays/<env>/values
# carry the per-env values; this file only holds defaults that apply to
# every env.

replicas: 2

# Controller runs on the system baseline managed node group; Karpenter
# itself can't be auto-scheduled by Karpenter.
tolerations:
  - key: CriticalAddonsOnly
    operator: Exists

nodeSelector:
  agripulse.cloud/role: system

serviceAccount:
  create: true
  name: karpenter
  # Dev-hardcoded IRSA role ARN. Long-term: per-env overlay should inject
  # this the same way overlays/<env>/values does for services.
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::328972548541:role/KarpenterController-20260514025042773900000039

settings:
  # Dev-hardcoded. Long-term: per-env overlay should inject these from
  # `terraform output karpenter`.
  clusterName: agripulse-dev
  interruptionQueue: Karpenter-agripulse-dev

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Prometheus integration â€” kube-prometheus-stack scrapes the metrics
# endpoint via ServiceMonitor.
serviceMonitor:
  enabled: true
