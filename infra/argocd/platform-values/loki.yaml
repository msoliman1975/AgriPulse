deploymentMode: SimpleScalable
loki:
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    s3:
      region: eu-south-1
    bucketNames:
      chunks: agripulse-loki-chunks
      ruler: agripulse-loki-ruler
      admin: agripulse-loki-admin
  limits_config:
    retention_period: 30d

read:
  replicas: 2
write:
  replicas: 3
backend:
  replicas: 2

monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
test:
  enabled: false
