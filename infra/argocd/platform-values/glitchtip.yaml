# GlitchTip (open-source Sentry alternative) per ARCHITECTURE.md Â§ 3.3.
# Database is the cluster Postgres (CloudNativePG); Redis comes from the
# upstream chart's bundled instance.
env:
  DATABASE_URL_FROM:
    secretKeyRef:
      name: agripulse-glitchtip-db
      key: url
  SECRET_KEY_FROM:
    secretKeyRef:
      name: agripulse-glitchtip-secrets
      key: secret_key

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: errors.dev.agripulse.local
      paths: [{ path: /, pathType: Prefix }]
  tls:
    - hosts:
        - errors.dev.agripulse.local
      secretName: agripulse-glitchtip-tls

postgresql:
  enabled: false # use the cluster CNPG instance
redis:
  enabled: true # bundled small Redis is fine
