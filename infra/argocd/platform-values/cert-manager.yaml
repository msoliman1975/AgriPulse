installCRDs: true

# Dev-hardcoded IRSA role ARN for the DNS-01 solver. Same caveat as
# platform-values/external-dns.yaml: the platform AppSet does not layer
# overlays/<env>/values.yaml, so this must live here for now.
# Long-term: extend the platform AppSet to layer a per-env values file.
serviceAccount:
  create: true
  name: cert-manager
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::328972548541:role/agripulse-dev-cert-manager

prometheus:
  enabled: true
  servicemonitor:
    enabled: true

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
