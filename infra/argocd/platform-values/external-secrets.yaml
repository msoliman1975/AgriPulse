installCRDs: true
webhook:
  certManager:
    enabled: true
serviceMonitor:
  enabled: true

# IRSA — the controller pod assumes this role to fetch secrets from
# AWS Secrets Manager. ARN comes from `terraform output iam_role_arns`
# (key: external_secrets). Filled in at deploy time by CD-10 bootstrap.
serviceAccount:
  create: true
  name: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: ""
