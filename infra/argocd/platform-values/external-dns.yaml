provider: aws

# Constrain to our zone so a stray Ingress with a different host can never
# create records elsewhere.
domainFilters:
  - agripulse.cloud

# `upsert-only` is intentional for V1: removing an Ingress will NOT delete
# its DNS record. Flip to `sync` once we trust the controller end-to-end.
policy: upsert-only

txtOwnerId: agripulse-eks
txtPrefix: edns-

sources:
  - ingress
  - service

# ExternalDNS reads region from this env; eu-south-1 stays consistent with
# the Terraform default.
env:
  - name: AWS_REGION
    value: eu-south-1

# Dev-hardcoded IRSA role ARN. The platform ApplicationSet (appsets/platform.yaml)
# reads only this single values file — it does NOT layer overlays/<env>/values.yaml,
# so an empty `annotations: {}` here left the SA without its role-arn and
# external-dns fell back to the node's IAM role (which can't ListHostedZones).
# Long-term: extend the platform AppSet to layer a per-env values file, the
# same way the services AppSet does. Same pattern as platform-values/karpenter.yaml.
serviceAccount:
  create: true
  name: external-dns
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::328972548541:role/agripulse-dev-external-dns

# Schedule on the system baseline node group; Karpenter (CD-8) adds more
# nodes for workloads but ExternalDNS belongs with the cluster operators.
tolerations:
  - key: CriticalAddonsOnly
    operator: Exists

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
