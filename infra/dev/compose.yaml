# MissionAgre — local development services.
#
# Brings up Postgres+TimescaleDB+PostGIS, Redis, Keycloak, and MinIO so the
# backend (and later the frontend) can run natively against them. See
# docs/decisions/0002-local-dev-services-in-compose.md for context.
#
# Usage from the repo root:
#   docker compose -f infra/dev/compose.yaml up -d
#   docker compose -f infra/dev/compose.yaml ps
#   docker compose -f infra/dev/compose.yaml down
#   docker compose -f infra/dev/compose.yaml down -v   # also drop volumes
#
# Tested with Rancher Desktop on Windows in dockerd (moby) mode; works the
# same on Docker Desktop and on Podman with compose support.
#
# All credentials in this file are dev-only and committed on purpose. Never
# reuse them outside this stack — production runs in Kubernetes with
# External Secrets Operator (ARCHITECTURE.md § 3.2).

name: missionagre-dev

services:
  # Postgres 16 + TimescaleDB + PostGIS + pg_stat_statements, bundled by the
  # timescaledb-ha image. Same image the integration test suite uses, so the
  # extensions Alembic creates (migration 0001) are guaranteed to be there.
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: missionagre-postgres
    environment:
      POSTGRES_DB: missionagre
      POSTGRES_USER: missionagre
      POSTGRES_PASSWORD: missionagre
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U missionagre -d missionagre"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Single Redis instance shared across cache, Celery broker, and SSE pub/sub
  # by logical-DB convention (db 0/1/2) per ARCHITECTURE.md § 3.1.
  redis:
    image: redis:7-alpine
    container_name: missionagre-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Keycloak in dev mode. The realm at ./keycloak/missionagre-realm.json is
  # imported on first start and persists in the keycloakdata volume after.
  # `start-dev` enables HTTP and disables hostname strictness — fine locally,
  # never use this configuration anywhere a real client connects.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: missionagre-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # Bootstrap admin (Keycloak 26+ env names).
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/missionagre-realm.json:/opt/keycloak/data/import/missionagre-realm.json:ro
      - keycloakdata:/opt/keycloak/data
    restart: unless-stopped

  # MinIO acts as the S3-compatible endpoint in dev. Buckets are created by
  # the minio-init sidecar below.
  minio:
    image: quay.io/minio/minio:latest
    container_name: missionagre-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: missionagre
      MINIO_ROOT_PASSWORD: missionagre-dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # One-shot bucket provisioner. Polls until MinIO is reachable, then creates
  # the buckets the backend expects. Exits 0; not restarted.
  minio-init:
    image: quay.io/minio/mc:latest
    container_name: missionagre-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 missionagre missionagre-dev >/dev/null 2>&1; do
          echo "waiting for minio..."
          sleep 1
        done
        mc mb --ignore-existing local/missionagre-imagery
        mc mb --ignore-existing local/missionagre-uploads
        echo "minio buckets ready: missionagre-imagery, missionagre-uploads"
    restart: "no"

volumes:
  pgdata:
  redisdata:
  keycloakdata:
  miniodata:
