# nginx config for the AgriPulse SPA.
#
# - SPA fallback: every unknown path serves /index.html so client routing
#   handles the URL.
# - Aggressive cache for hashed assets; no-cache for the entry HTML.
# - /healthz returns 200 for kubelet liveness/readiness probes.
# - API calls are NOT proxied here; the cluster ingress routes /api/* to
#   the backend service. The dev-time Vite proxy plays the same role.

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Health endpoint for Kubernetes probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Vite emits hashed filenames into /assets â€” cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Entry HTML must always be revalidated.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
