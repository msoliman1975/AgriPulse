# Alembic configuration for AgriPulse.
#
# Two separate environments live under ./migrations/:
#
#   public  â€” the shared schema (tenancy, iam, catalogs)
#   tenant  â€” applied per-tenant schema by scripts/migrate_tenants.py
#
# Run a public migration:    alembic -n public upgrade head
# Run a tenant migration:    alembic -n tenant -x schema=tenant_<uuid> upgrade head
#
# Connection URLs are read from app.core.settings (env vars) inside env.py.
# This file only carries Alembic structure; secrets live in env.

[alembic]
# default section name `[alembic]` is required by Alembic but unused here â€”
# every command uses one of the named sections below.

[public]
script_location = migrations/public
prepend_sys_path = .
version_path_separator = os
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[tenant]
script_location = migrations/tenant
prepend_sys_path = .
version_path_separator = os
file_template = %%(rev)s_%%(slug)s
timezone = UTC

# ----------------------------------------------------------------------------
# Logging â€” keep migration logs structured so they line up with the API logs.
# ----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
