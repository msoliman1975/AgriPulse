# scout_for_stress_v1 — recommend on-foot scouting when NDVI signals
# stress on a block.
#
# Intentionally crop-agnostic (crop_code: null) — every leafy crop
# benefits from the same baseline-deviation signal. The thresholds
# match the alert thresholds (-1.5 σ critical, -0.5..-1.5 σ warning)
# so an alert and a scouting recommendation surface together when the
# block is in trouble.

code: scout_for_stress_v1
name_en: Scout for stress
name_ar: فحص حقلي للإجهاد
description_en: >-
  When a block's NDVI drops below its own seasonal baseline, queue a
  scouting visit. Critical priority for severe drops (≥1.5 σ); warning
  priority for moderate drops (0.5..1.5 σ).
description_ar: >-
  عند انخفاض NDVI لحقل ما عن المعدل الموسمي الخاص به، حدّد زيارة فحص
  حقلية. أولوية حرجة للانخفاضات الحادة (1.5 σ فأكثر) وتحذيرية للمتوسطة
  (0.5..1.5 σ).

crop_code: null
applicable_regions: []

# Scientific provenance (KB P1-A). Evaluator-invisible metadata: it
# documents *why* this rule exists and how far it travels. NDVI anomaly
# vs a per-field seasonal baseline is a long-established stress indicator;
# what it cannot do is attribute the cause — hence this rule recommends a
# scouting visit rather than a specific intervention. That limitation is
# stated explicitly in evidence.notes per the "state uncertainty" rule.
evidence:
  confidence: high
  notes: >-
    NDVI depression relative to a field's own seasonal baseline is a
    well-established indicator of vegetation stress, but it is
    non-specific: water, nutrient, pest, disease and senescence stress
    all depress NDVI. The rule therefore triggers ground scouting to
    attribute cause rather than prescribing treatment. Baseline-relative
    (z-score) framing makes the signal field- and crop-agnostic.
  citations:
    - source_type: peer_reviewed
      title: >-
        Red and photographic infrared linear combinations for monitoring
        vegetation
      doi: 10.1016/0034-4257(79)90013-0
      year: 1979
    - source_type: peer_reviewed
      title: >-
        Monitoring vegetation systems in the Great Plains with ERTS
      url: https://ntrs.nasa.gov/citations/19740022614
      year: 1974
    - source_type: fao
      title: >-
        FAO GIEWS — Earth Observation: NDVI anomaly for agricultural
        drought and crop-condition monitoring
      url: https://www.fao.org/giews/earthobservation/

transferability:
  egypt: high
  middle_east: high
  global: high

root: root
nodes:
  root:
    label_en: Is NDVI below its seasonal baseline?
    label_ar: هل NDVI أقل من المعدل الموسمي؟
    condition:
      tree:
        op: lt
        left:
          source: indices
          index_code: ndvi
          key: baseline_deviation
        right: -0.5
    on_match: severity_check
    on_miss: leaf_no_action

  severity_check:
    label_en: Is the drop severe (≥ 1.5 σ)?
    label_ar: هل الانخفاض حاد (≥ 1.5 انحراف معياري)؟
    condition:
      tree:
        op: lt
        left:
          source: indices
          index_code: ndvi
          key: baseline_deviation
        right: -1.5
    on_match: leaf_scout_critical
    on_miss: leaf_scout_warning

  leaf_scout_critical:
    label_en: Severe stress — scout within 24h
    label_ar: إجهاد حاد — فحص خلال 24 ساعة
    outcome:
      action_type: scout
      severity: critical
      confidence: 0.85
      valid_for_hours: 72
      parameters:
        priority: high
        within_hours: 24
      text_en: >-
        Severe NDVI drop on this block. Schedule a field scouting visit
        within 24 hours to identify the cause (water, pest, disease,
        nutrition).
      text_ar: >-
        تراجع حاد في NDVI على هذا الحقل. حدّد زيارة فحص حقلية خلال 24
        ساعة لتحديد السبب (ري، آفات، أمراض، تغذية).

  leaf_scout_warning:
    label_en: Moderate stress — scout within 72h
    label_ar: إجهاد متوسط — فحص خلال 72 ساعة
    outcome:
      action_type: scout
      severity: warning
      confidence: 0.65
      valid_for_hours: 168
      parameters:
        priority: medium
        within_hours: 72
      text_en: >-
        NDVI is below the historical baseline. Add this block to your
        next routine scouting round (within 72 hours).
      text_ar: >-
        NDVI أقل من المعدل التاريخي. أضف هذا الحقل إلى جولة الفحص
        الروتينية التالية (خلال 72 ساعة).

  leaf_no_action:
    label_en: No action — NDVI within baseline
    label_ar: لا إجراء — NDVI ضمن المعدل
    outcome:
      action_type: no_action
      severity: info
      confidence: 0.9
      parameters: {}
      text_en: >-
        NDVI is within the seasonal baseline; no scouting recommended at
        this time.
      text_ar: NDVI ضمن المعدل الموسمي؛ لا توصية بالفحص حاليًا.
