name: argocd-sync

# After CI's containers job pushes images to GHCR with the commit SHA, this
# workflow opens a small PR that bumps the per-image tags under
# `global.images.<chart>.tag` in the dev overlay so ArgoCD picks up the
# new build. Staging and production stay manual.
#
# CD-12: replaced an earlier single-`image.tag` shim that left tile-server
# pinned to an old tag because its image was never bumped. yq writes each
# chart's key independently.
#
# The alternative â€” installing ArgoCD Image Updater into the cluster and
# letting it poll GHCR â€” is a P2 upgrade. PR-bumping is auditable and
# gives reviewers a one-line diff per release.

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-dev-image-tags:
    name: bump dev image tags
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          # Need history to find the commit the CI run was for.
          fetch-depth: 0

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Verify yq v4 available
        # Mike Farah's yq v4 â€” atomic, validates YAML, won't accidentally
        # bump unrelated fields the way the previous regex could. The
        # ubuntu-24.04 runner image ships yq v4; this is a sanity check
        # so a future image swap that drops it surfaces here, not silently.
        run: |
          set -eu
          if ! command -v yq >/dev/null; then
            echo "yq not installed on runner image" >&2
            exit 1
          fi
          yq --version
          yq --version | grep -q 'version v4\.' || { echo "yq must be v4 (Mike Farah)"; exit 1; }

      - name: Bump dev overlay image tags
        env:
          NEW_TAG: ${{ steps.sha.outputs.short }}
        run: |
          set -eu
          OVERLAY=infra/argocd/overlays/dev/values.yaml
          # Per-image map under global.images.<key>.tag. The chart helpers
          # default the empty string back to .Chart.AppVersion, so a
          # missing key never breaks `helm template`. tile-server's
          # overlay key is camelCase `tileServer` because the hyphenated
          # chart name isn't a valid bare YAML map key.
          for img in api workers frontend tileServer; do
            yq -i ".global.images.${img}.tag = strenv(NEW_TAG)" "$OVERLAY"
          done
          echo "Bumped overlay to $NEW_TAG:"
          yq '.global.images' "$OVERLAY"

      - name: Open bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: argocd/dev-image-bump
          base: main
          delete-branch: true
          title: "chore(argocd): bump dev image tag to ${{ steps.sha.outputs.short }}"
          commit-message: |
            chore(argocd): bump dev image tag to ${{ steps.sha.outputs.short }}

            Auto-generated by .github/workflows/argocd-sync.yml after the
            containers CI job pushed `${{ steps.sha.outputs.short }}` to
            ghcr.io/${{ github.repository_owner }}/agripulse/*.
          labels: |
            argocd
            automation
          body: |
            Auto-bump from `main` CI run
            [`${{ github.event.workflow_run.id }}`](${{ github.event.workflow_run.html_url }}).

            New images:
            - `ghcr.io/${{ github.repository_owner }}/agripulse/api:${{ steps.sha.outputs.short }}`
            - `ghcr.io/${{ github.repository_owner }}/agripulse/workers:${{ steps.sha.outputs.short }}`
            - `ghcr.io/${{ github.repository_owner }}/agripulse/tile-server:${{ steps.sha.outputs.short }}`
            - `ghcr.io/${{ github.repository_owner }}/agripulse/frontend:${{ steps.sha.outputs.short }}`

            Merging this triggers ArgoCD's auto-sync in the dev environment.
            Staging and production overlays are intentionally not touched â€”
            promotion happens via a hand-written PR after smoke testing.
