name: argocd-sync

# After CI's containers job pushes images to GHCR with the commit SHA, this
# workflow opens a small PR that bumps `image.tag` in the dev overlay so
# ArgoCD picks up the new build. Staging and production stay manual.
#
# The alternative — installing ArgoCD Image Updater into the cluster and
# letting it poll GHCR — is a P2 upgrade. PR-bumping is auditable and
# gives reviewers a one-line diff per release.

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-dev-image-tags:
    name: bump dev image tags
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          # Need history to find the commit the CI run was for.
          fetch-depth: 0

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Bump dev overlay image tag
        env:
          NEW_TAG: ${{ steps.sha.outputs.short }}
        run: |
          set -eu
          OVERLAY=infra/argocd/overlays/dev/values.yaml
          # Idempotent — if the overlay already pins the tag, replace it;
          # otherwise append. The overlay is loaded for every chart so a
          # single image.tag entry there propagates to api/workers/etc.
          if grep -qE '^image:' "$OVERLAY"; then
            python -c '
          import re, sys, pathlib
          p = pathlib.Path(sys.argv[1])
          tag = sys.argv[2]
          text = p.read_text()
          new = re.sub(
              r"(image:\s*\n(?:\s+\w+:.*\n)*?\s+tag:\s*\")[^\"]*(\")",
              lambda m: m.group(1) + tag + m.group(2),
              text,
              count=1,
          )
          if new == text:
              new = re.sub(
                  r"(image:\s*\n)",
                  r"\1  tag: \"" + tag + "\"\n",
                  text,
                  count=1,
              )
          p.write_text(new)
          ' "$OVERLAY" "$NEW_TAG"
          else
            printf '\nimage:\n  tag: "%s"\n' "$NEW_TAG" >> "$OVERLAY"
          fi

      - name: Open bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: argocd/dev-image-bump
          base: main
          delete-branch: true
          title: "chore(argocd): bump dev image tag to ${{ steps.sha.outputs.short }}"
          commit-message: |
            chore(argocd): bump dev image tag to ${{ steps.sha.outputs.short }}

            Auto-generated by .github/workflows/argocd-sync.yml after the
            containers CI job pushed `${{ steps.sha.outputs.short }}` to
            ghcr.io/${{ github.repository_owner }}/missionagre/*.
          labels: |
            argocd
            automation
          body: |
            Auto-bump from `main` CI run
            [`${{ github.event.workflow_run.id }}`](${{ github.event.workflow_run.html_url }}).

            New images:
            - `ghcr.io/${{ github.repository_owner }}/missionagre/api:${{ steps.sha.outputs.short }}`
            - `ghcr.io/${{ github.repository_owner }}/missionagre/workers:${{ steps.sha.outputs.short }}`
            - `ghcr.io/${{ github.repository_owner }}/missionagre/tile-server:${{ steps.sha.outputs.short }}`
            - `ghcr.io/${{ github.repository_owner }}/missionagre/frontend:${{ steps.sha.outputs.short }}`

            Merging this triggers ArgoCD's auto-sync in the dev environment.
            Staging and production overlays are intentionally not touched —
            promotion happens via a hand-written PR after smoke testing.
