name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a new commit is pushed to the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # No `cache: pip` here â€” it requires a requirements.txt or
          # pyproject.toml to exist to hash for the cache key. Backend's
          # pyproject.toml lands in PR 2; the pre-commit env cache below
          # is the one that actually matters at this stage.

      - name: Install pre-commit
        run: pip install pre-commit==3.8.0

      - name: Restore pre-commit env cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  backend:
    name: backend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pinned to match the local-dev minimum and the lockfile's
          # `revision = 3` format.
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          # uv sync needs a lockfile; without one we resolve from pyproject.
          if [ -f uv.lock ]; then
            uv sync --frozen --extra dev
          else
            uv pip install --python .venv/bin/python -e ".[dev]"
          fi

      - name: ruff
        run: uv run --python .venv/bin/python ruff check .

      - name: black --check
        run: uv run --python .venv/bin/python black --check .

      - name: mypy
        run: uv run --python .venv/bin/python mypy app workers

      - name: import-linter
        run: uv run --python .venv/bin/python lint-imports

      - name: pytest unit
        run: uv run --python .venv/bin/python pytest tests/unit -m "not integration"

      - name: pytest integration
        # Requires Docker daemon for testcontainers. ubuntu-24.04 ships
        # Docker; we just need to be able to talk to it.
        run: uv run --python .venv/bin/python pytest tests/integration -m integration
        env:
          # testcontainers occasionally needs the runtime to find its
          # ryuk reaper image; keep defaults.
          TESTCONTAINERS_RYUK_DISABLED: "false"

  frontend:
    name: frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable corepack and pin pnpm
        # corepack ships with Node 22 but is opt-in. The pnpm version comes
        # from frontend/package.json's `engines.pnpm` field via packageManager.
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  helm:
    name: helm
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Add chart repos for dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: helm dependency build (charts with dependencies)
        run: |
          for chart in infra/helm/keycloak; do
            if [ -f "${chart}/Chart.yaml" ] && grep -q '^dependencies:' "${chart}/Chart.yaml"; then
              echo "::group::dependency build ${chart}"
              helm dependency build "${chart}"
              echo "::endgroup::"
            fi
          done

      - name: helm lint
        run: |
          for chart in infra/helm/*/; do
            echo "::group::lint ${chart}"
            helm lint "${chart}"
            echo "::endgroup::"
          done

      - name: helm template (smoke render)
        run: |
          for chart in infra/helm/*/; do
            name=$(basename "${chart}")
            echo "::group::template ${name}"
            helm template "${name}" "${chart}" >/dev/null
            echo "::endgroup::"
          done

  infra-tf:
    name: infra-tf
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      # OIDC for AWS role assumption; PR write so we can sticky-comment the plan.
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: Configure AWS credentials (OIDC plan role)
        # Only configure AWS on same-repo PRs where the plan-role ARN is
        # wired up. Skipped on fork PRs (OIDC subject won't match) and
        # before the first `terraform apply` populates
        # `AWS_TERRAFORM_PLAN_ROLE_ARN`. The backend-less validate path
        # below picks up whichever case the OIDC path skips.
        if: github.event_name == 'pull_request' && github.repository == github.event.pull_request.base.repo.full_name && vars.AWS_TERRAFORM_PLAN_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          aws-region: eu-south-1

      - name: terraform init (no backend)
        # Validate path used on push-to-main and on fork PRs; the apply
        # workflow does a real `terraform init` with the backend.
        if: github.event_name != 'pull_request' || github.repository != github.event.pull_request.base.repo.full_name || vars.AWS_TERRAFORM_PLAN_ROLE_ARN == ''
        run: terraform init -backend=false

      - name: terraform validate
        if: github.event_name != 'pull_request' || github.repository != github.event.pull_request.base.repo.full_name || vars.AWS_TERRAFORM_PLAN_ROLE_ARN == ''
        run: terraform validate
        env:
          TF_VAR_environment: dev

      - name: terraform init (with backend)
        if: github.event_name == 'pull_request' && github.repository == github.event.pull_request.base.repo.full_name && vars.AWS_TERRAFORM_PLAN_ROLE_ARN != ''
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.AWS_TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=eu-south-1" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ vars.AWS_TF_LOCK_TABLE }}"

      - name: terraform plan
        if: github.event_name == 'pull_request' && github.repository == github.event.pull_request.base.repo.full_name && vars.AWS_TERRAFORM_PLAN_ROLE_ARN != ''
        id: plan
        run: |
          terraform plan -no-color -out=plan.tfplan -input=false \
            -var "environment=dev" \
            -var "github_org=${{ github.repository_owner }}" \
            -var "github_repo=${{ github.event.repository.name }}" \
            -var "tf_state_bucket=${{ vars.AWS_TF_STATE_BUCKET }}" \
            | tee plan.txt
        continue-on-error: true

      - name: Post plan as sticky PR comment
        if: github.event_name == 'pull_request' && github.repository == github.event.pull_request.base.repo.full_name && vars.AWS_TERRAFORM_PLAN_ROLE_ARN != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan-dev
          path: infra/terraform/plan.txt

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  containers:
    name: containers
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: backend
            dockerfile: backend/Dockerfile
          - name: workers
            # Workers and the API ship from the same image â€” Celery picks
            # the entrypoint via the chart's command override. We tag the
            # same content under both names so DoD #1 sees four image
            # paths in GHCR.
            context: backend
            dockerfile: backend/Dockerfile
          - name: tile-server
            context: tile-server
            dockerfile: tile-server/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v6

      # BH-4: multi-arch builds (linux/amd64 + linux/arm64) so api +
      # workers + tile-server + frontend can land on Karpenter arm64
      # nodes without the `kubernetes.io/arch: amd64` nodeSelector
      # stopgap added in project_aws_resume_2026_05_16_pm.
      # QEMU is used for cross-arch emulation; arm64 builds run slower
      # but the gha cache (mode=max, scoped per image) keeps subsequent
      # PRs cheap.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agripulse/${{ matrix.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # BH-4: always build both arches. Both arches build on every
          # PR (build-only, not push) so the three chained image-build
          # bugs from project_aws_resume_2026_05_16_late (uv sync
          # --active, workers/ hatch packaging, celery `:app` symbol)
          # get caught pre-merge instead of on the cluster.
          platforms: linux/amd64,linux/arm64
          # Push only on merge to main; PR runs build-only to keep
          # turn-around fast and avoid polluting GHCR with PR images.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance / SBOM attestations on push so we can verify
          # image origin from cosign + a registry-native SBOM is
          # available for vulnerability scanners.
          provenance: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          sbom: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # GHA cache scoped per image so frontend layers don't bust the
          # backend cache (or vice versa). `mode=max` cache-to writes
          # all intermediate layers, which matters for QEMU-emulated
          # builds where the slowest layer (uv sync arm64) is also the
          # most cacheable.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
